# Pre-registered hypotheses for the Levin → Neosynaptex bridge.
# Canonical protocol: docs/protocols/levin_bridge_protocol.md
# This file is the machine-readable form of Step 5.
#
# Any analysis notebook or test that claims to evaluate the bridge MUST
# load this file, map each hypothesis ID to a concrete statistical test,
# and fail the run if any required test is missing.

schema_version: 1  # version of THIS YAML file's structure
protocol: docs/protocols/levin_bridge_protocol.md
contract_version: v2  # version of the CSV row contract in cross_substrate_horizon_metrics.csv
contract_split:
  required:
    - H
    - C
    - gamma
  optional:
    - P  # substrate-specific; nullable under contract v2
validation_rules:
  - rule: regime_claims_require_H_C_gamma
    statement: >-
      Any row missing a numeric value for H_raw, H_rank, C, gamma,
      gamma_ci_lo, or gamma_ci_hi is invalid and MUST NOT enter any
      analysis, including regime diagnostics.
  - rule: productivity_claims_require_defined_P
    statement: >-
      Only rows with P_status == "defined" may feed productivity or
      capability claims. Rows with P_status in {"not_defined",
      "preregistered_pending"} are valid for H/C/gamma analysis and
      falsification controls, but are EXCLUDED from every P-dependent
      viability check at Step 9.
  - rule: no_silent_legacy_reinterpretation
    statement: >-
      Legacy contract-v1 rows (pre-schema-bump) MUST be migrated
      explicitly via substrates.bridge.levin_runner.migrate_v1_to_v2
      OR rejected. v1 P values are never silently carried forward
      with P_status == "defined". Migration opts them into
      P_status == "preregistered_pending" with P emptied.

variables:
  H:
    name: integration_horizon
    description: >-
      Effective spatiotemporal extent over which a perturbation can
      influence coordinated system behavior. Operationalisation is
      substrate-specific; see protocol Step 7.
    scale: ratio
    rank_normalised: true
  C:
    name: coordination_strength
    description: >-
      Substrate-appropriate coordination metric: phase locking,
      synchrony, graph coherence, mutual predictability, or stable
      inter-agent coupling.
    scale: ratio
  gamma:
    name: gamma_metastability
    description: >-
      Neosynaptex metastability signature from organisational cost vs
      topological complexity. See docs/science/MECHANISMS.md §1 and
      core/gamma.py.
    scale: ratio
    target: 1.0
  P:
    name: productivity
    description: >-
      Task-level output metric showing the system is functionally
      performing, not merely complex. **Optional under contract v2**:
      each substrate that wishes to feed productivity claims must
      preregister its own P definition in a separate contract PR
      (see `mfn_plus_contract_report.md` for the MFN+ precedent).
      When preregistered and numeric, the row's P_status is "defined".
      When absent, the row's P_status is "not_defined" or
      "preregistered_pending", and the row is VALID for H/C/gamma
      regime analysis but EXCLUDED from every productivity-gated claim.
    scale: ratio
    required: false
    substrate_specific: true
    preregistration_status: per-substrate
    current_preregistrations:
      mfn_plus:
        substrate: mfn_plus
        contract_version: v2
        p_status: not_defined
        decision_rationale: >-
          MFN+ is a morphogenesis simulator, not a task-solver.
          SimulationResult exposes only activity counters (growth_events,
          turing_activations, clamping_events) plus the raw field and
          history. None of these is a task-level productivity metric in
          the Levin-bridge sense. Higher-level modules expose candidate
          task frames (active inference against a preregistered target
          field; forecasting accuracy; cross-seed reproducibility), but
          every one of them requires a substrate-owner decision that
          has not been made. Defining any of them without that decision
          is semantic inflation, which the contract-v2 split was
          introduced to prevent.
        blocking_reason: >-
          No canonical, substrate-native productivity metric exists for
          MFN+ at the time of this preregistration. Three candidate
          options were evaluated and each requires an unresolved
          canonical decision — see
          docs/protocols/mfn_plus_productivity_prereg.md §3.
        required_future_decision: >-
          A future substrate-owner PR must resolve exactly one of the
          three options named in mfn_plus_productivity_prereg.md §3
          (target-anchored active inference, forecasting accuracy with a
          post-output-control semantics rule, or cross-seed
          reproducibility re-framed as a non-productivity metric). Only
          after such a PR lands may MFN+ rows transition from
          p_status=not_defined to p_status=defined. Wiring that emits
          numeric P without that transition is fabrication.
        evaluated_candidates_rejected:
          - name: growth_events
            rejection_reason: activity counter, not task output
          - name: turing_activations
            rejection_reason: activity counter, not task output
          - name: clamping_events
            rejection_reason: activity counter, not task output
          - name: cross_seed_reproducibility_inverse_variance
            rejection_reason: conflates stability with productivity
        commit_sha: to_be_stamped_at_merge
        companion_doc: docs/protocols/mfn_plus_productivity_prereg.md

hypotheses:
  - id: H1
    type: primary
    statement: >-
      Higher H and stronger C predict gamma moving toward 1.0 while P
      remains viable.
    operationalisation:
      - Spearman rank correlation between H and |gamma - 1| is negative
        and significant (p < 0.01, two-sided) after substrate-wise
        stratification.
      - Partial correlation controlling for P retains sign and
        significance.
      - Interaction term H × C is a non-trivial regressor of gamma
        after controlling for each alone.
  - id: H0
    type: null
    statement: >-
      No consistent relation between (H, C) and gamma survives null
      controls.
    operationalisation:
      - Shuffled-control permutation distribution of the H↔gamma
        correlation contains the observed value at p >= 0.05.
  - id: H2
    type: alternative
    statement: >-
      Expanded H increases complexity but degrades function, producing
      drift or collapse rather than gamma≈1 stabilisation.
    operationalisation:
      - In at least one substrate, the expanded-horizon regime shows
        gamma drifting away from 1.0 while P declines monotonically.
      - Rejection of H2 does NOT confirm H1; they are not exhaustive.

kill_criterion:
  id: KILL
  statement: >-
    If gamma approaches 1.0 equally often in shuffled, scrambled, or
    non-productive controls, the bridge fails and LEVIN_BRIDGE_VERDICT
    must record the failed canonical statement from protocol Step 10.
  operationalisation:
    - Distribution of gamma in any control condition from
      evidence/levin_bridge/controls.yaml is statistically
      indistinguishable (KS test p >= 0.05) from the productive
      expanded-horizon condition.

forbidden_claims:
  - gamma_equals_one_proves_intelligence
  - gamma_equals_one_proves_cognition
  - gamma_equals_one_validates_universal_agency
  - visual_or_pareidolic_analogy_as_evidence
