name: CI

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_COLOR: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev --frozen
      - run: uv run ruff check src/ tests/ scripts/ benchmarks/
      - run: uv run ruff format --check src/ tests/ scripts/ benchmarks/

  types:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev --frozen
      - name: Strict types (types + security)
        run: uv run mypy src/mycelium_fractal_net/types/ src/mycelium_fractal_net/security/ --strict
      - name: Strict types (core + analytics + neurochem) — CI gate blocks merge
        run: uv run mypy src/mycelium_fractal_net/core/ src/mycelium_fractal_net/analytics/ src/mycelium_fractal_net/neurochem/ --strict --exclude '(turing|federated|stdp)\.py'

  unit:
    name: Unit (${{ matrix.python-version }})
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev --frozen
      - run: uv run pytest tests/ -q --tb=short --timeout=300 --junitxml=junit-${{ matrix.python-version }}.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: junit-*.xml
          retention-days: 30

  core-only:
    name: Core (no optional deps)
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev --frozen
      - name: Core tests without ML/optional deps
        run: uv run pytest tests/ -q --tb=short --timeout=300 --ignore=tests/ml/ -k "not slow and not benchmark"

  integration:
    name: Integration
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev --frozen
      - run: uv run pytest tests/integration/ tests/test_cli_workflows.py tests/test_public_api_structure.py tests/test_integration_api_cli.py -q --tb=short

  artifact-integrity:
    name: Artifact Integrity
    needs: [unit]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev --frozen
      - run: uv run lint-imports
      - run: uv run python scripts/export_openapi.py
      - run: uv run python scripts/check_openapi_contract.py
      - run: uv run python scripts/verify_matrix.py
      - run: uv run python scripts/docs_drift_check.py
      - name: Contract validation (source of truth)
        run: uv run python scripts/validate_contracts.py
      - name: Architecture ledger
        run: uv run python scripts/generate_architecture_ledger.py
      - name: Reproducibility matrix
        run: uv run python scripts/generate_reproducibility_matrix.py
      - name: Interface parity
        run: uv run python scripts/interface_parity_check.py
      - name: Architectural invariants
        run: uv run pytest tests/test_architectural_invariants.py -v --timeout=60
      - name: Docs↔runtime contract (examples must execute)
        run: uv run pytest tests/test_docs_examples.py -v --timeout=60
      - name: Golden hash regression
        run: uv run pytest tests/test_golden_hashes.py -v --timeout=60
      - name: Schema↔code sync
        run: uv run pytest tests/test_schema_code_sync.py -v --timeout=60

  causal-gate:
    name: Causal Gate
    needs: [unit]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev --frozen
      - name: Causal validation tests
        run: uv run pytest tests/test_causal_invariants.py tests/test_causal_config_sync.py -v --timeout=120
      - name: Causal rule manifest
        run: uv run python -m mycelium_fractal_net.core.causal_validation --manifest

  coverage:
    name: Coverage
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev --frozen
      - run: uv run pytest tests/ --cov=mycelium_fractal_net --cov-branch --cov-report=xml:coverage.xml --cov-report=term-missing --cov-fail-under=80 -q
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  verify:
    name: Reproduce + Adversarial
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev --extra bio
      - name: Canonical reproduction
        run: uv run python experiments/reproduce.py
      - name: Adversarial validation
        run: uv run python experiments/adversarial.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verify-results
          path: |
            experiments/actual_output.json
            results/adversarial_results.json
          retention-days: 30

  ci-gate:
    name: CI Gate
    if: always()
    needs: [lint, types, unit, core-only, integration, artifact-integrity, causal-gate, coverage, verify]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs passed
        run: |
          results=(
            "${{ needs.lint.result }}"
            "${{ needs.types.result }}"
            "${{ needs.unit.result }}"
            "${{ needs.core-only.result }}"
            "${{ needs.integration.result }}"
            "${{ needs.artifact-integrity.result }}"
            "${{ needs.causal-gate.result }}"
            "${{ needs.coverage.result }}"
            "${{ needs.verify.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" != "success" ]]; then
              echo "::error::Required CI job failed: $r"
              exit 1
            fi
          done
          echo "All CI gates passed."
