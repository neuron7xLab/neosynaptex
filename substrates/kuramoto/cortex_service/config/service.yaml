service:
  name: TradePulse Cortex Service
  version: 1.0.0
  description: Cognitive signal orchestration for TradePulse portfolios
  metrics_path: /metrics
  log_level: INFO
  host: 0.0.0.0
  port: 8001
  tls:
    cert_file: /service/tls/cortex-server.pem
    key_file: /service/tls/cortex-server.key.pem
    client_ca_file: /service/tls/root-ca.pem
    require_client_certificate: false


database:
  url: postgresql+psycopg://cortex@cortex-db:5432/cortex?sslmode=verify-full
  pool_size: 10
  pool_timeout: 30
  echo: false
  tls:
    ca_file: /service/tls/root-ca.pem
    cert_file: /service/tls/cortex-db-client.pem
    key_file: /service/tls/cortex-db-client.key.pem

signals:
  rescale_min: -1.0
  rescale_max: 1.0
  smoothing_factor: 0.25
  volatility_floor: 1e-6

risk:
  max_absolute_exposure: 2.0
  var_confidence: 0.95
  stress_scenarios:
    - 0.85
    - 0.5

regime:
  decay: 0.2
  min_valence: -1.0
  max_valence: 1.0
  confidence_floor: 0.1
