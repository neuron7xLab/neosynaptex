metadata:
  service: "TradePulse Public API"
  release: "2025.1"
  docs_base_url: "https://docs.tradepulse.example/api"
  default_signature_algorithm: "ed25519"
  idempotency_header: "X-Idempotency-Key"
  maintainers:
    - name: "Platform Engineering"
      contact: "platform@tradepulse.example"
    - name: "Developer Experience"
      contact: "devex@tradepulse.example"
  compatibility:
    default: "stable"
    support_window_days: 180
environments:
  - name: "production"
    base_url: "https://api.tradepulse.example"
  - name: "staging"
    base_url: "https://staging.api.tradepulse.example"
routes:
  - name: "get-market-signal"
    method: "GET"
    path: "/v1/signals/{symbol}"
    summary: "Retrieve the latest trading signal for a symbol."
    description: |
      Returns the most recent directional signal generated by the TradePulse
      orchestration pipeline. The payload is cacheable for short periods to
      reduce latency for repeated reads while ensuring that updates propagate
      quickly to clients.
    scope: "signals:read"
    tags: ["signals", "market-data"]
    cache:
      strategy: "public"
      max_age: 15
      stale_while_revalidate: 30
    throttle:
      burst: 12
      period_seconds: 60
    rate_limit:
      per_minute: 180
      per_hour: 5000
      per_day: 40000
    request_schema: null
    response_schema: "schemas/http/json/1.0.0/market_signal_response.schema.json"
    signatures:
      required: true
      algorithm: "ed25519"
      header: "X-TradePulse-Signature"
      version: "v1"
    idempotency:
      required: false
      header: null
      ttl_seconds: null
    webhooks:
      - "signal.published"
    simulators:
      - status_code: 200
        description: "Representative BUY signal payload."
        body:
          symbol: "BTC-USD"
          as_of: "2025-02-01T12:30:00Z"
          signal: "BUY"
          confidence: 0.82
          horizon_minutes: 30
          ttl_seconds: 90
          metadata:
            market: "crypto"
            venue: "BINANCE"
    smoke_tests:
      - name: "signal-btc-ok"
        description: "Fetch BTC-USD signal and validate structure."
        request:
          method: "GET"
          path: "/v1/signals/BTC-USD"
          headers:
            X-TradePulse-Signature: "test-signature"
        expected_status: 200
        response_schema: "schemas/http/json/1.0.0/market_signal_response.schema.json"
  - name: "create-prediction"
    method: "POST"
    path: "/v1/predictions"
    summary: "Submit feature vectors and request an inference run."
    description: |
      Accepts raw or precomputed features for the predictive inference service.
      Requests are idempotent and will stream completion updates through the
      associated webhook contract. The response returns a tracking identifier
      that can be used for reconciliation.
    scope: "predictions:write"
    tags: ["predictions", "inference"]
    cache:
      strategy: "no-store"
      max_age: 0
      stale_while_revalidate: 0
    throttle:
      burst: 5
      period_seconds: 60
    rate_limit:
      per_minute: 30
      per_hour: 500
      per_day: 3000
    request_schema: "schemas/http/json/1.0.0/prediction_create_request.schema.json"
    response_schema: "schemas/http/json/1.0.0/prediction_create_response.schema.json"
    signatures:
      required: true
      algorithm: "ed25519"
      header: "X-TradePulse-Signature"
      version: "v1"
    idempotency:
      required: true
      header: "X-Idempotency-Key"
      ttl_seconds: 86400
    webhooks:
      - "prediction.completed"
    simulators:
      - status_code: 202
        description: "Successful prediction submission."
        body:
          request_id: "pred-20250201-001"
          status: "accepted"
          submitted_at: "2025-02-01T12:31:00Z"
          estimated_completion_at: "2025-02-01T12:32:30Z"
          links:
            webhook: "https://webhooks.tradepulse.example/predictions/pred-20250201-001"
            status: "https://api.tradepulse.example/v1/predictions/pred-20250201-001"
    smoke_tests:
      - name: "prediction-accepted"
        description: "Submit canonical inference payload."
        request:
          method: "POST"
          path: "/v1/predictions"
          headers:
            Content-Type: "application/json"
            X-TradePulse-Signature: "test-signature"
            X-Idempotency-Key: "demo-key-1"
          body:
            symbol: "ETH-USD"
            horizon_minutes: 15
            features:
              price: 2485.23
              ema_fast: 2490.12
              ema_slow: 2420.44
        expected_status: 202
        response_schema: "schemas/http/json/1.0.0/prediction_create_response.schema.json"
webhooks:
  - name: "signal.published"
    summary: "Emitted whenever a new trading signal is available."
    method: "POST"
    delivery:
      retry_policy:
        max_attempts: 5
        backoff_seconds: 30
      signature:
        header: "X-TradePulse-Webhook"
        algorithm: "ed25519"
        version: "v1"
    schema: "schemas/events/json/1.0.0/signals.schema.json"
  - name: "prediction.completed"
    summary: "Delivered when an asynchronous prediction finishes execution."
    method: "POST"
    delivery:
      retry_policy:
        max_attempts: 8
        backoff_seconds: 45
      signature:
        header: "X-TradePulse-Webhook"
        algorithm: "ed25519"
        version: "v1"
    schema: "schemas/events/json/1.0.0/prediction_completed.schema.json"
compatibility:
  - route: "create-prediction"
    minimum_client_version: "2.5.0"
    status: "stable"
    comments: "Requires webhook consumption with exponential backoff."
migrations:
  - id: "MIG-2025-05-01-prediction-v2"
    applies_to: ["create-prediction"]
    summary: "New prediction outputs include scenario bands and distribution tails."
    effective_on: "2025-05-01"
    instructions_url: "https://docs.tradepulse.example/migrations/prediction-v2"
deprecations:
  - route: "get-market-signal"
    sunset_date: "2025-12-31"
    reason: "Superseded by the /v2/signals endpoint with streaming updates."
    replacement: "/v2/signals/{symbol}"
    status: "announced"
changelog:
  - version: "2025.1"
    released_at: "2025-02-01"
    summary: "Added asynchronous prediction workflow and raised signal rate limits."
    compatibility: "stable"
    highlights:
      - "Introduced POST /v1/predictions with webhook callbacks."
      - "Increased GET /v1/signals cache window and burst limits."
  - version: "2024.4"
    released_at: "2024-11-15"
    summary: "Initial stable release of the TradePulse public API."
    compatibility: "stable"
    highlights:
      - "Released GET /v1/signals/{symbol} endpoint."
