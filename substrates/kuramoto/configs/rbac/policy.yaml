roles:
  foundation:viewer:
    description: "Baseline read access to portfolio state, analytics, and runbooks."
    permissions:
      - resource: analytics.dashboards
        action: read
      - resource: portfolio.positions
        action: read
      - resource: knowledge.runbooks
        action: read
      - resource: system.status
        action: read
      - resource: system.positions
        action: read
  research:quant:
    description: "Develop and validate strategies within research environments."
    inherits:
      - foundation:viewer
    permissions:
      - resource: research.backtests
        action: run
        attributes:
          environment: ["research", "staging"]
      - resource: strategies.repository
        action: write
      - resource: models.registry
        action: register
        attributes:
          stage: ["experimental", "staging"]
  trading:operator:
    description: "Execute approved strategies and manage live positions."
    inherits:
      - foundation:viewer
      - research:quant
    permissions:
      - resource: orders
        action: submit
        attributes:
          environment: ["production"]
          desk: ["execution", "quant"]
      - resource: orders
        action: cancel
        attributes:
          environment: ["production"]
          desk: ["execution", "quant"]
      - resource: portfolio.limits
        action: adjust
        attributes:
          approval: ["risk-certified"]
  mlops:engineer:
    description: "Operate the model lifecycle and feature store pipelines."
    inherits:
      - foundation:viewer
    permissions:
      - resource: models.registry
        action: promote
        attributes:
          stage: ["staging", "production"]
      - resource: feature_store.pipelines
        action: manage
      - resource: artifacts.lineage
        action: read
  platform:sre:
    description: "Maintain infrastructure reliability and deployment automation."
    inherits:
      - foundation:viewer
    permissions:
      - resource: deployments
        action: rollout
        attributes:
          environment: ["staging", "production"]
      - resource: infrastructure.configuration
        action: manage
      - resource: observability.audits
        action: read
  risk:officer:
    description: "Operate risk controls, kill switches, and compliance checks."
    inherits:
      - foundation:viewer
    permissions:
      - resource: risk.kill_switch
        action: read
        attributes:
          environment: ["production"]
      - resource: risk.kill_switch
        action: execute
        attributes:
          environment: ["production"]
      - resource: risk.limits
        action: approve
  security:auditor:
    description: "Perform security reviews and audit investigations."
    inherits:
      - foundation:viewer
    permissions:
      - resource: audit.records
        action: read
        attributes:
          environment: ["production", "staging"]
      - resource: iam.role_bindings
        action: read
  iam:administrator:
    description: "Least-privilege administrators for policy lifecycle and break-glass operations."
    inherits:
      - trading:operator
      - mlops:engineer
      - platform:sre
      - risk:officer
      - security:auditor
    permissions:
      - resource: iam.policies
        action: manage
      - resource: secrets.vault
        action: rotate
      - resource: access.temporary_grants
        action: approve

temporary_grants:
  - subject: incident-responder
    resource: risk.kill_switch
    action: execute
    attributes:
      environment: ["production"]
    expires_at: "2099-01-01T00:00:00Z"
    reason: "Disaster recovery standing authorisation"
    requested_by: "security-team"
