# Global configuration for all subcharts
global:
  # Image registry configuration
  imageRegistry: ""
  imagePullSecrets: []
  
  # Storage class for persistent volumes
  storageClass: ""
  
  # Security context defaults
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  
  # Container security context
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  
  # OpenTelemetry configuration
  otel:
    enabled: true
    endpoint: "http://otel-collector:4317"
    serviceName: "tradepulse"
  
  # SLO configuration
  slo:
    enabled: true
    errorBudget: 0.001  # 99.9% uptime
    latencyP99Threshold: 500  # milliseconds
  
  # Network policies
  networkPolicy:
    enabled: true
    policyTypes:
      - Ingress
      - Egress
  
  # Pod security admission
  podSecurity:
    enforce: "baseline"
    audit: "restricted"
    warn: "restricted"

# Sandbox service configuration
sandbox:
  enabled: true
  replicaCount: 2
  
  image:
    repository: tradepulse/sandbox
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 8080
  
  # Resource requests and limits
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  
  # Horizontal Pod Autoscaler
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  
  # Pod Disruption Budget
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  
  # Service Monitor for Prometheus
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
  
  # Health probes configuration
  livenessProbe:
    enabled: true
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 10
  
  readinessProbe:
    enabled: true
    path: /ready
    initialDelaySeconds: 10
    periodSeconds: 5
  
  # Environment variables
  env:
    - name: LOG_LEVEL
      value: "info"
  
  # Secrets
  secrets:
    enabled: true
    secretName: tradepulse-sandbox-secrets

# Admin service configuration
admin:
  enabled: true
  replicaCount: 1
  
  image:
    repository: tradepulse/admin
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 8000
  
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  podDisruptionBudget:
    enabled: false
    minAvailable: 1

  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    path: /metrics

  livenessProbe:
    enabled: true
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 10

  readinessProbe:
    enabled: true
    path: /ready
    initialDelaySeconds: 10
    periodSeconds: 5

  env:
    - name: LOG_LEVEL
      value: "info"
  
  secrets:
    enabled: true
    secretName: tradepulse-admin-secrets

# Observability stack configuration
observability:
  enabled: true
  
  # Prometheus
  prometheus:
    enabled: true
    retention: 15d
    
  # Grafana
  grafana:
    enabled: true
    # SECURITY: Change this password before deploying to production
    # Use a secret management solution like HashiCorp Vault or Kubernetes Secrets
    adminPassword: ""  # Must be set via --set grafana.adminPassword or secrets
  
  # OpenTelemetry Collector
  otelCollector:
    enabled: true
    image:
      repository: otel/opentelemetry-collector-contrib
      tag: "0.114.0"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
