version: 2
updates:
  # Python dependencies (production + dev)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - dependencies
      - python
    open-pull-requests-limit: 10
    groups:
      # Development and testing tools (non-production)
      dev-tools:
        patterns:
          - "pytest*"
          - "hypothesis"
          - "ruff"
          - "mypy"
          - "black"
          - "bandit"
          - "pre-commit"
          - "towncrier"
          - "detect-secrets"
      # Core data science libraries (production)
      data-core:
        patterns:
          - "numpy"
          - "scipy"
          - "pandas"
          - "networkx"
          - "scikit-learn"
      # Web frameworks and API libraries (production)
      web-api:
        patterns:
          - "fastapi"
          - "uvicorn"
          - "pydantic"
          - "starlette"

  # Python security constraints
  - package-ecosystem: "pip"
    directory: "/constraints"
    schedule:
      interval: "weekly"
    labels:
      - dependencies
      - python
      - security
    open-pull-requests-limit: 5

  # Go modules (terraform tests)
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - dependencies
      - go
    open-pull-requests-limit: 5

  # JavaScript/TypeScript (web frontend)
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
    labels:
      - dependencies
      - javascript
      - frontend
    open-pull-requests-limit: 10
    groups:
      # Development tools
      frontend-dev-tools:
        patterns:
          - "eslint*"
          - "prettier"
          - "@types/*"
          - "typescript"
      # Next.js and React (production)
      nextjs-react:
        patterns:
          - "next"
          - "react"
          - "react-dom"

  # JavaScript/TypeScript (UI dashboard)
  - package-ecosystem: "npm"
    directory: "/ui/dashboard"
    schedule:
      interval: "weekly"
    labels:
      - dependencies
      - javascript
      - ui
    open-pull-requests-limit: 10
    groups:
      # Development tools
      ui-dev-tools:
        patterns:
          - "playwright*"
          - "@playwright/*"
          - "eslint*"
          - "@types/*"
          - "typescript"

  # Rust dependencies
  - package-ecosystem: "cargo"
    directory: "/rust/tradepulse-accel"
    schedule:
      interval: "weekly"
    labels:
      - dependencies
      - rust
    open-pull-requests-limit: 5

  # Terraform infrastructure
  - package-ecosystem: "terraform"
    directory: "/infra/terraform/eks"
    schedule:
      interval: "weekly"
    labels:
      - dependencies
      - terraform
      - infrastructure
    open-pull-requests-limit: 5

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - dependencies
      - ci
      - security
    open-pull-requests-limit: 10
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      # Group minor/patch updates to reduce PR noise
      github-actions-updates:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions composite actions
  - package-ecosystem: "github-actions"
    directory: "/.github/actions"
    schedule:
      interval: "weekly"
    labels:
      - dependencies
      - ci
      - security
    open-pull-requests-limit: 10
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-actions-updates:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - dependencies
      - docker
    open-pull-requests-limit: 5
