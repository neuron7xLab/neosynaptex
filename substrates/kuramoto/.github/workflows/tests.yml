        run: npx playwright test --config=playwright.config.ts --reporter=list --project="Desktop Chrome"
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: warn
          retention-days: 7

  nightly-flaky-tests:
    runs-on: ubuntu-latest
    # Only run on schedule or manual trigger to monitor flaky tests
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: fast-unit-tests
    timeout-minutes: 20
    continue-on-error: true
    name: Quarantined Flaky Tests (Nightly Monitoring)
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      
      - uses: ./.github/actions/setup-tradepulse
        with:
          python-version: '3.11'
          cache-prefix: venv-flaky-nightly
      
      - name: Prepare test report directories
        run: mkdir -p reports
      
      # Localization sync is already done in the main tests job, no need to duplicate
      - name: Run quarantined flaky tests
        run: |
          set -o pipefail
          set +e
          .venv/bin/python -m pytest tests/ -m flaky \
            --reruns=2 --reruns-delay=2 \
            --junitxml=reports/flaky-tests.xml \
            --html=reports/flaky-tests-report.html --self-contained-html \
            --flaky-report=reports/flaky-tests.json
          status=$?
          set -e
          if [ "$status" -eq 5 ]; then
            echo "No tests collected for 'flaky' marker; treating as success."
            exit 0
          fi
          exit "$status"
      - name: Upload flaky test artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: flaky-tests-artifacts
          path: |
            reports/flaky-tests.xml
            reports/flaky-tests-report.html
            reports/flaky-tests.json
          if-no-files-found: warn
