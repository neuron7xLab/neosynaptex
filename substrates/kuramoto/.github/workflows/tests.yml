name: Tests

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/*.md'
  pull_request:
    branches:
      # Ensure linting, typing, and tests run for every PR.
      - '**'
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/*.md'
  # Heavy jobs run on schedule (nightly) or manual trigger
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily for heavy test suites
  workflow_dispatch:  # Allow manual triggering

concurrency:
  group: tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  detect_ui_changes:
    runs-on: ubuntu-latest
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            ui:
              - 'ui/**'
            web:
              - 'apps/web/**'

  dependency_security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            sbom/combined-requirements.txt
            requirements-dev.lock
            constraints/security.txt

      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints/security.txt -r sbom/combined-requirements.txt
          pip install -c constraints/security.txt -r requirements-dev.lock
          pip install -c constraints/security.txt pip-audit packaging

      - name: Check dependency drift
        run: python scripts/security/check_dependency_drift.py --output artifacts/security/dependency-drift.json

      - name: Run pip-audit (HIGH/CRITICAL)
        run: |
          mkdir -p artifacts/security
          pip-audit --desc \
            --format json \
            --output artifacts/security/pip-audit.json \
            --severity HIGH --severity CRITICAL \
            -r sbom/combined-requirements.txt || true

          if [ -f artifacts/security/pip-audit.json ]; then
            OTHER_VULNS=$(jq -r '
              [.dependencies[] // empty |
               select(.vulns != null and (.vulns | length) > 0) |
               .vulns[] |
               select(.id != "GHSA-4xh5-x5gv-qwph")
              ] | length
            ' artifacts/security/pip-audit.json)

            echo "Found $OTHER_VULNS HIGH/CRITICAL vulnerabilities (excluding GHSA-4xh5-x5gv-qwph)"
            if [ "$OTHER_VULNS" -gt 0 ]; then
              echo "ERROR: Vulnerabilities detected"
              exit 1
            fi
          else
            echo "ERROR: pip-audit report not found"
            exit 1
          fi

      - name: Upload dependency security artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dependency-security
          path: |
            artifacts/security/dependency-drift.json
            artifacts/security/pip-audit.json

  # ============================================================================
  # PR FAST GATES - These jobs are required for every PR and must be fast
  # Target: Complete in ≤10-12 minutes total
  # ============================================================================

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']
    name: Lint & Type Check (Python ${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: ./.github/actions/setup-tradepulse
        with:
          python-version: ${{ matrix.python-version }}
          cache-prefix: venv-lint

      - name: Run Python linting (ruff, black, mypy)
        run: |
          .venv/bin/ruff check .
          .venv/bin/black --check .
          .venv/bin/mypy

  metrics-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Metrics Validation
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock
            constraints/security.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock ]; then pip install -c constraints/security.txt -r requirements.lock; fi
          if [ -f requirements-dev.lock ]; then pip install -c constraints/security.txt -r requirements-dev.lock; fi
          pip install -c constraints/security.txt detect-secrets

      - name: Run metrics validation
        run: python scripts/validate_metrics.py

      - name: Upload metrics validation artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: metrics-validation
          path: artifacts/metrics-validation
          if-no-files-found: warn
      - name: Run detect-secrets scan
        run: |
          set -euo pipefail
          scan_output="$(mktemp)"
          detect-secrets scan core backtest execution src application >"$scan_output"
          python - <<'PY' "$scan_output"
          import json
          import sys

          path = sys.argv[1]
          data = json.loads(open(path, encoding="utf-8").read())
          results = data.get("results", {})
          violations = sum(len(entries) for entries in results.values())
          if violations:
              message = [
                  "Potential secrets detected in privileged modules:",
                  json.dumps(results, indent=2, sort_keys=True),
              ]
              raise SystemExit("\n".join(message))
          PY

  web-lint:
    runs-on: ubuntu-latest
    needs: detect_ui_changes
    name: Web Frontend Lint & Type Check
    if: needs.detect_ui_changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        working-directory: apps/web
        run: npm ci
      - name: Run Prettier format check
        working-directory: apps/web
        run: npm run format:check
      - name: Run ESLint
        working-directory: apps/web
        run: npm run lint
      - name: Run TypeScript type check
        working-directory: apps/web
        run: npm run typecheck
      - name: Run Jest unit tests
        working-directory: apps/web
        run: npm run test

  fast-unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      line_rate: ${{ steps.coverage_summary.outputs.line_rate }}
      branch_rate: ${{ steps.coverage_summary.outputs.branch_rate }}
      tests_total: ${{ steps.test_summary.outputs.total }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']
    name: Fast Unit Tests (Python ${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: ./.github/actions/setup-tradepulse
        with:
          python-version: ${{ matrix.python-version }}
          cache-prefix: venv-fast
      
      - name: Prepare test report directories
        run: mkdir -p reports
      
      - name: Sync localization resources
        run: .venv/bin/python scripts/localization/sync_translations.py

      - name: Summarize localization coverage
        id: localization_summary
        continue-on-error: true
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import sys

          report_path = pathlib.Path('reports/localization/coverage.json')
          if not report_path.exists():
              print('::warning::Localization coverage report not generated')
              print('⚠️ Localization coverage report not generated', file=sys.stderr)
              summary = "### Localization coverage\n\n_Report not generated_\n"
              step_summary = os.environ.get('GITHUB_STEP_SUMMARY')
              if step_summary:
                  with open(step_summary, 'a', encoding='utf-8') as handle:
                      handle.write(summary)
              github_output = os.environ.get('GITHUB_OUTPUT')
              if github_output:
                  with open(github_output, 'a', encoding='utf-8') as handle:
                      handle.write("coverage_summary<<'EOF'\n")
                      handle.write(summary)
                      handle.write('EOF\n')
              sys.exit(0)

          try:
              data = json.loads(report_path.read_text(encoding='utf-8'))
          except Exception as e:
              print(f'::warning::Error parsing localization coverage: {e}')
              print(f'⚠️ Error parsing localization coverage: {e}', file=sys.stderr)
              sys.exit(0)

          lines = [
              "### Localization coverage",
              "",
              "| Locale | Coverage | Missing keys | Extra keys |",
              "| --- | --- | --- | --- |",
          ]
          for locale in sorted(data.get('locales', {})):
              payload = data['locales'][locale]
              missing = '<br>'.join(payload.get('missing', [])) or '—'
              extra = '<br>'.join(payload.get('extra', [])) or '—'
              coverage = float(payload.get('coverageRatio', 0.0)) * 100.0
              lines.append(f"| {locale} | {coverage:.2f}% | {missing} | {extra} |")
          lines.append("")
          summary = "\n".join(lines) + "\n"

          step_summary = os.environ.get('GITHUB_STEP_SUMMARY')
          if step_summary:
              with open(step_summary, 'a', encoding='utf-8') as handle:
                  handle.write(summary)

          github_output = os.environ.get('GITHUB_OUTPUT')
          if github_output:
              with open(github_output, 'a', encoding='utf-8') as handle:
                  handle.write("coverage_summary<<'EOF'\n")
                  handle.write(summary)
                  handle.write('EOF\n')
          PY
      - name: Upload localization coverage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: localization-coverage
          path: reports/localization/coverage.json
          if-no-files-found: warn
          retention-days: 7
      - name: Run test quality validation
        id: test_quality
        run: |
          .venv/bin/python -m tools.testing.quality_validator \
            --test-dir=tests \
            --report=reports/test-quality.json \
            --threshold=70.0
      - name: Run fast unit tests (PR gate)
        id: run_tests
        run: |
          # Fast tests only: exclude slow, heavy_math, nightly, flaky
          # Use reruns for transient failures
          .venv/bin/python -m pytest \
            tests/ \
            -m "not slow and not heavy_math and not nightly and not flaky" \
            --cov=core --cov=backtest --cov=execution \
            --cov-branch \
            --cov-report=xml --cov-report=term-missing \
            --junitxml=reports/fast-unit-tests.xml \
            --html=reports/fast-unit-tests-report.html --self-contained-html \
            --json-report --json-report-file=reports/test-results.json \
            --reruns 3 --reruns-delay 1 \
            --only-rerun AssertionError --only-rerun TimeoutError \
            -q
      - name: Run ECS regulator coverage
        run: |
          .venv/bin/python -m pytest core/neuro/tests/test_ecs_regulator.py \
            --cov=core.neuro.ecs_regulator --cov-report=term-missing
      - name: Track test performance
        if: always()
        continue-on-error: true
        run: |
          if [ -f reports/test-results.json ]; then
            .venv/bin/python -m tools.testing.performance_tracker \
              --results=reports/test-results.json \
              --report=reports/test-performance.json \
              --save-baseline=reports/test-performance-baseline.json
          else
            echo "⚠️ Test results file not found, skipping performance tracking"
          fi
      - name: Run smoke tests (golden path)
        continue-on-error: true
        run: |
          # Quick smoke test to validate core functionality
          .venv/bin/python -m pytest tests/smoke/ \
            -m "smoke and not slow" \
            --junitxml=reports/smoke-tests.xml \
            -q
      - name: Publish fast test coverage summary
        if: always()
        id: coverage_summary
        continue-on-error: true
        run: |
          python - <<'PY'
          import os
          import pathlib
          import sys
          import xml.etree.ElementTree as ET

          report_path = pathlib.Path("coverage.xml")
          if not report_path.exists():
              print("⚠️ coverage.xml not found", file=sys.stderr)
              sys.exit(0)

          try:
              root = ET.parse(report_path).getroot()
              line_rate = float(root.get("line-rate", 0.0)) * 100
              branch_rate = float(root.get("branch-rate", 0.0)) * 100
          except Exception as e:
              print(f"⚠️ Error parsing coverage: {e}", file=sys.stderr)
              sys.exit(0)

          summary_lines = [
              "### Fast Test Coverage (PR Gate)",
              "",
              "| Metric | Percentage |",
              "| --- | --- |",
              f"| Line coverage | {line_rate:.2f}% |",
              f"| Branch coverage | {branch_rate:.2f}% |",
              "",
              "_Note: Full coverage validation runs in the extended test suite._",
              "",
          ]

          step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if step_summary:
              with open(step_summary, "a", encoding="utf-8") as handle:
                  handle.write("\n".join(summary_lines))

          github_output = os.environ.get("GITHUB_OUTPUT")
          if github_output:
              with open(github_output, "a", encoding="utf-8") as handle:
                  handle.write(f"line_rate={line_rate:.2f}\n")
                  handle.write(f"branch_rate={branch_rate:.2f}\n")
          PY

      - name: Enforce coverage regression guard (fast)
        run: |
          python -m tools.coverage.drop_guard \
            --baseline configs/quality/coverage_baseline.json \
            --coverage coverage.xml

      - name: Summarize fast test results
        if: always()
        id: test_summary
        uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86 # v2
        with:
          paths: |
            reports/fast-unit-tests.xml
            reports/smoke-tests.xml
          show: "fail, skip, pass"
      - name: Find existing test summary comment
        if: ${{ always() && github.event_name == 'pull_request' && matrix.python-version == '3.11' && !github.event.pull_request.head.repo.fork }}
        id: find_test_comment
        uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574fdf654e61f9e # v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '### Test & Coverage Summary'
      - name: Post fast test summary comment
        if: ${{ always() && github.event_name == 'pull_request' && matrix.python-version == '3.11' && !github.event.pull_request.head.repo.fork }}
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find_test_comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            ### Fast Test Suite Summary (Python ${{ matrix.python-version }}) - PR Gate

            **Status:** ${{ job.status == 'success' && '✅ Fast tests passed' || job.status == 'cancelled' && '⚪ Tests cancelled' || '❌ Fast tests failed' }}
            **Coverage:** ${{ steps.coverage_summary.outputs.line_rate || 'n/a' }}% lines

            | Metric | Value |
            | --- | --- |
            | Total tests | ${{ steps.test_summary.outputs.total }} |
            | Passed | ${{ steps.test_summary.outputs.passed }} |
            | Failed | ${{ steps.test_summary.outputs.failed }} |
            | Skipped | ${{ steps.test_summary.outputs.skipped }} |
            | Line coverage | ${{ steps.coverage_summary.outputs.line_rate || 'n/a' }}% |
            | Branch coverage | ${{ steps.coverage_summary.outputs.branch_rate || 'n/a' }}% |

            **Note:** This runs fast unit/integration tests only. Full test suite (98% coverage gate, E2E, benchmarks) runs nightly or on `main` push.

            [View workflow run →](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
      - name: Upload fast test JUnit reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fast-junit-results-py${{ matrix.python-version }}
          path: |
            reports/fast-unit-tests.xml
            reports/smoke-tests.xml
          if-no-files-found: warn
          retention-days: 7
          
      - name: Upload fast test HTML reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fast-html-reports-py${{ matrix.python-version }}
          path: |
            reports/fast-unit-tests-report.html
          if-no-files-found: warn
          retention-days: 7
      - name: Upload fast test metrics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fast-test-metrics-py${{ matrix.python-version }}
          path: |
            reports/test-results.json
            reports/test-performance.json
          if-no-files-found: warn
          retention-days: 7
          
      - name: Upload fast coverage reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fast-coverage-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: warn
          retention-days: 7

  flaky-tests:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    name: Flaky Tests with Retries (Python ${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      
      - uses: ./.github/actions/setup-tradepulse
        with:
          python-version: ${{ matrix.python-version }}
          cache-prefix: venv-flaky
      
      - name: Prepare test report directories
        run: mkdir -p reports
      
      - name: Run flaky tests with retries
        continue-on-error: true
        run: |
          # Run flaky tests with high retry count
          .venv/bin/python -m pytest \
            tests/ \
            -m "flaky" \
            --reruns 5 --reruns-delay 2 \
            --junitxml=reports/flaky-tests.xml \
            --html=reports/flaky-tests-report.html --self-contained-html \
            -q
      - name: Upload flaky test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: flaky-test-reports-py${{ matrix.python-version }}
          path: |
            reports/flaky-tests.xml
            reports/flaky-tests-report.html
          if-no-files-found: warn
          retention-days: 7

  serotonin-cert:
    runs-on: ubuntu-latest
    needs: fast-unit-tests
    timeout-minutes: 10
    name: Serotonin Fast Certification
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock
            constraints/security.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints/security.txt -r requirements.lock
          pip install -c constraints/security.txt -r requirements-dev.lock
      - name: Run serotonin fast certification
        run: |
          python scripts/serotonin_certify.py \
            --dataset data/sample_crypto_ohlcv.csv \
            --seed 123 \
            --out artifacts/serotonin-cert \
            --fast
      - name: Upload certification artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: serotonin-cert
          path: artifacts/serotonin-cert
          if-no-files-found: warn

  security-fast:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ['3.11']
    name: Security Scans (Fast - Python ${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      
      - uses: ./.github/actions/setup-tradepulse
        with:
          python-version: ${{ matrix.python-version }}
          cache-prefix: venv-security
      
      - name: Activate virtual environment
        run: echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH
      
      - name: Run static security analysis (Bandit)
        run: |
          python -m tools.security.sast \
            --fail-on-severity MEDIUM \
            --output reports/security/bandit.json \
            --summary reports/security/sast_summary.json
      
      - name: Run dynamic security probes
        run: python -m tools.security.dast_probe --report reports/security/dast_report.json
      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: security-reports
          path: |
            reports/security/bandit.json
            reports/security/sast_summary.json
            reports/security/dast_report.json
          if-no-files-found: warn

  stop-the-line-gate:
    name: Stop-the-Line Quality Gate
    runs-on: ubuntu-latest
    needs:
      - lint
      - fast-unit-tests
      - security-fast
      - web-lint
      - serotonin-cert
    if: ${{ always() }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      
      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6
        with:
          python-version: '3.11'
      
      - name: Install PyYAML for performance validation
        run: pip install PyYAML
      
      - name: Download test performance artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        continue-on-error: true
        with:
          name: fast-test-metrics-py3.11
          path: reports/
      
      - name: Validate performance budgets
        id: perf_validation
        continue-on-error: true
        run: |
          if [ -f reports/test-performance.json ]; then
            python -m tools.performance.validate_budgets \
              --config configs/perf_budgets.yaml \
              --results reports/test-performance.json \
              --fail-on-breach
          else
            echo "⚠️ Performance results not available, skipping validation"
          fi
      
      - name: Enforce canonical gates
        env:
          LINT_STATUS: ${{ needs.lint.result }}
          TEST_STATUS: ${{ needs.fast-unit-tests.result }}
          SECURITY_STATUS: ${{ needs.security-fast.result }}
          WEB_STATUS: ${{ needs.web-lint.result }}
          SEROTONIN_STATUS: ${{ needs.serotonin-cert.result }}
          LINE_RATE: ${{ needs.fast-unit-tests.outputs.line_rate }}
          BRANCH_RATE: ${{ needs.fast-unit-tests.outputs.branch_rate }}
          LINE_THRESHOLD: "98.0"
          BRANCH_THRESHOLD: "90.0"
        run: |
          set -euo pipefail

          declare -A REQUIRED_JOBS=(
            ["lint"]="$LINT_STATUS"
            ["fast-unit-tests"]="$TEST_STATUS"
            ["security-fast"]="$SECURITY_STATUS"
            ["web-lint"]="$WEB_STATUS"
            ["serotonin-cert"]="$SEROTONIN_STATUS"
          )

          failures=0
          summary_lines=("### Stop-the-Line Gate" "" "| Check | Status |" "| --- | --- |")

          for job in "${!REQUIRED_JOBS[@]}"; do
            status="${REQUIRED_JOBS[$job]}"
            if [[ "$status" != "success" ]]; then
              echo "❌ ${job} did not succeed (status=${status})"
              summary_lines+=("| ${job} | ❌ ${status} |")
              failures=1
            else
              echo "✅ ${job} succeeded"
              summary_lines+=("| ${job} | ✅ success |")
            fi
          done

          set +e
          python - <<'PY' "$LINE_RATE" "$BRANCH_RATE" "$LINE_THRESHOLD" "$BRANCH_THRESHOLD"
import sys

line_rate, branch_rate, line_threshold, branch_threshold = sys.argv[1:]

def parse(value: str) -> float | None:
    try:
        return float(value)
    except Exception:
        return None

line = parse(line_rate)
branch = parse(branch_rate)
line_gate = parse(line_threshold) or 95.0
branch_gate = parse(branch_threshold) or 90.0

messages: list[str] = []
exit_code = 0

if line is None:
    messages.append(f"❌ Coverage metrics missing; cannot enforce line coverage gate ({line_gate}%)")
    exit_code = 1
elif line < line_gate:
    messages.append(f"❌ Line coverage {line:.2f}% below gate ({line_gate:.2f}%)")
    exit_code = 1
else:
    messages.append(f"✅ Line coverage {line:.2f}% meets gate ({line_gate:.2f}%)")

if branch is None:
    messages.append(f"❌ Branch coverage metrics missing; cannot enforce branch gate ({branch_gate}%)")
    exit_code = 1
elif branch < branch_gate:
    messages.append(f"❌ Branch coverage {branch:.2f}% below gate ({branch_gate:.2f}%)")
    exit_code = 1
else:
    messages.append(f"✅ Branch coverage {branch:.2f}% meets gate ({branch_gate:.2f}%)")

for line in messages:
    print(line)

if exit_code:
    raise SystemExit(exit_code)
PY
          coverage_status=$?
          set -e
          if [[ $coverage_status -ne 0 ]]; then
            failures=1
            summary_lines+=("| Coverage gate | ❌ failed |")
          else
            summary_lines+=("| Coverage gate | ✅ passed |")
          fi
          summary_lines+=("| Line coverage | ${LINE_RATE:-n/a} (gate ${LINE_THRESHOLD}%) |")
          summary_lines+=("| Branch coverage | ${BRANCH_RATE:-n/a} (gate ${BRANCH_THRESHOLD}%) |")

          # Check performance validation result
          PERF_STATUS="${{ steps.perf_validation.outcome }}"
          if [[ "$PERF_STATUS" == "failure" ]]; then
            summary_lines+=("| Performance budget | ❌ failed |")
            failures=1
          elif [[ "$PERF_STATUS" == "success" ]]; then
            summary_lines+=("| Performance budget | ✅ passed |")
          else
            summary_lines+=("| Performance budget | ⚠️ skipped |")
          fi

          if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
            printf "%s\n" "${summary_lines[@]}" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ $failures -ne 0 ]]; then
            echo "❌ Stop-the-line gate blocked this run"
            exit 1
          fi

  # ============================================================================
  # HEAVY / EXTENDED JOBS - Run on schedule (nightly), main push, or manual trigger
  # These jobs are comprehensive but take longer to execute
  # ============================================================================

  full-test-suite:
    runs-on: ubuntu-latest
    # Only run on main push, schedule, or manual trigger - NOT on PRs
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: fast-unit-tests
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    name: Full Test Suite with 98% Coverage (Python ${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      
      - uses: ./.github/actions/setup-tradepulse
        with:
          python-version: ${{ matrix.python-version }}
          cache-prefix: venv-full
          
      - name: Prepare test report directories
        run: mkdir -p reports
        
      - name: Run full test suite with coverage
        run: |
          # Run ALL tests including slow, heavy_math, nightly (but not flaky)
          .venv/bin/python -m pytest \
            tests/ \
            -m "not flaky" \
            --cov=core --cov=backtest --cov=execution \
            --cov-branch \
            --cov-report=xml --cov-report=term-missing --cov-report=html:coverage_html \
            --cov-fail-under=98 \
            --junitxml=reports/full-test-suite.xml \
            --html=reports/full-test-suite-report.html --self-contained-html \
            --json-report --json-report-file=reports/full-test-results.json
            
      - name: Publish full coverage summary
        if: always()
        run: |
          python - <<'PY'
          import os
          import pathlib
          import xml.etree.ElementTree as ET

          report_path = pathlib.Path("coverage.xml")
          if not report_path.exists():
              print("⚠️ coverage.xml not found")
              exit(0)

          root = ET.parse(report_path).getroot()
          line_rate = float(root.get("line-rate", 0.0)) * 100
          branch_rate = float(root.get("branch-rate", 0.0)) * 100
          threshold = 98.0
          margin = line_rate - threshold

          status_line = "✅" if line_rate >= threshold else "❌"
          status_branch = "✅" if branch_rate >= 90 else "❌"
          status_margin = "✅" if margin >= 0 else "⚠️"
          
          summary_lines = [
              "### Full Test Suite Coverage",
              "",
              "| Metric | Percentage | Target | Status |",
              "| --- | --- | --- | --- |",
              f"| Line coverage | {line_rate:.2f}% | {threshold:.0f}% | {status_line} |",
              f"| Branch coverage | {branch_rate:.2f}% | 90% | {status_branch} |",
              f"| Coverage margin | {margin:+.2f}% | — | {status_margin} |",
              "",
          ]
          summary = "\n".join(summary_lines)
          
          step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if step_summary:
              with open(step_summary, "a") as f:
                  f.write(summary)
          PY
          
      - name: Upload full test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: full-test-suite-py${{ matrix.python-version }}
          path: |
            reports/full-test-suite.xml
            reports/full-test-suite-report.html
            reports/full-test-results.json
            coverage.xml
            coverage_html
          if-no-files-found: warn
          retention-days: 30
          
      - name: Upload coverage to Codecov
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          files: ./coverage.xml
          flags: full-suite-py${{ matrix.python-version }}
          fail_ci_if_error: false

  examples-smoke:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    name: Examples Smoke Tests
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.lock
            constraints/security.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock ]; then pip install -c constraints/security.txt -r requirements.lock; fi

      - name: Validate examples manifest
        run: python scripts/ci/check_examples_manifest.py

      - name: Run example quickstarts
        env:
          PYTHONPATH: .
        run: |
          python examples/quick_start.py --seed 7 --num-points 400
          python examples/neuro_trade_pulse_backtest.py
          python examples/neuro_trade_pulse_snapshot.py
          python examples/integrated_risk_management_example.py

  mutation-trading-engine:
    runs-on: ubuntu-latest
    # Only run on main push, schedule, or manual trigger
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: fast-unit-tests
    timeout-minutes: 60
    name: Targeted Mutation Testing (Trading Engine)
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      
      - uses: ./.github/actions/setup-tradepulse
        with:
          python-version: '3.11'
          cache-prefix: venv-mutation
      
      - name: Run targeted mutation suite
        run: .venv/bin/python -m tools.mutation.trading_engine_suite --reports-dir reports/mutmut/trading_engine --threshold 0.9
      - name: Upload trading engine mutation artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: trading-engine-mutation
          path: reports/mutmut/trading_engine
          if-no-files-found: warn
          retention-days: 30
      - name: Upload coverage to Codecov (OIDC)
        if: ${{ !github.event.pull_request.head.repo.fork && secrets.CODECOV_TOKEN == '' }}
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          files: ./coverage.xml
          flags: py311
          name: py311-coverage
          fail_ci_if_error: false
          use_oidc: true

  ui_accessibility:
    name: UI & Accessibility (Playwright)
    runs-on: ubuntu-latest
    needs: detect_ui_changes
    if: needs.detect_ui_changes.outputs.ui == 'true'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/dashboard/package-lock.json
      - name: Install dashboard dependencies
        working-directory: ui/dashboard
        run: npm install
      - name: Install Playwright browsers
        working-directory: ui/dashboard
        run: npx playwright install --with-deps chromium
      - name: Run Playwright UI regression and accessibility checks
        working-directory: ui/dashboard
        env:
          UI_SEMANTIC_BASELINE: ${{ vars.UI_SEMANTIC_BASELINE || '' }}
        run: npx playwright test
      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dashboard-playwright-artifacts
          path: |
            ui/dashboard/playwright-report
            ui/dashboard/test-results
          if-no-files-found: warn

  benchmarks:
    runs-on: ubuntu-latest
    # Only run on main push, schedule, or manual trigger
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: fast-unit-tests
    timeout-minutes: 30
    name: Performance Benchmarks (Python 3.11)
    env:
      TP_BENCHMARK_ARTIFACT_DIR: reports/benchmarks
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      
      - uses: ./.github/actions/setup-tradepulse
        with:
          python-version: '3.11'
          cache-prefix: venv-bench
      
      - name: Run performance benchmarks
        id: run_benchmarks
        continue-on-error: true
        run: |
          mkdir -p "$TP_BENCHMARK_ARTIFACT_DIR"
          set +e
          .venv/bin/python -m pytest tests/performance \
            --benchmark-only \
            --benchmark-autosave \
            --benchmark-save=ci-latest \
            --benchmark-columns=mean,stddev,median,rounds \
            --benchmark-name=short
          benchmark_exit_code=$?
          set -e
          if [ $benchmark_exit_code -ne 0 ]; then
            echo "⚠️ Benchmark tests failed with exit code $benchmark_exit_code"
          fi
          exit $benchmark_exit_code
      - name: Summarize benchmark results
        if: always()
        id: benchmark_summary
        run: |
          python - <<'PY'
          import json
          import math
          import os
          from pathlib import Path

          artifact_dir = Path(os.environ.get("TP_BENCHMARK_ARTIFACT_DIR", "reports/benchmarks"))
          summary_lines: list[str] = ["### Performance Benchmark Summary", ""]
          comment_lines: list[str] = summary_lines.copy()
          regression_count = 0

          if not artifact_dir.exists():
              message = "Benchmark artifact directory was not created."
              summary_lines.append(message)
              comment_lines.append(message)
          else:
              candidates = sorted(artifact_dir.glob("benchmark-summary-*.json"), key=lambda p: p.stat().st_mtime)
              if not candidates:
                  message = "No benchmark summary files were generated."
                  summary_lines.append(message)
                  comment_lines.append(message)
              else:
                  latest = candidates[-1]
                  data = json.loads(latest.read_text())
                  records = data.get("records", [])
                  summary_lines.append(f"Latest results captured in `{latest.as_posix()}`.")
                  summary_lines.append("")
                  comment_lines.append(f"Latest results captured in `{latest.as_posix()}`.")
                  comment_lines.append("")
                  if not records:
                      message = "Benchmark summary file did not contain any records."
                      summary_lines.append(message)
                      comment_lines.append(message)
                  else:
                      header = "| Benchmark | Observed (s) | Baseline (s) | Δ% | Threshold | Status |"
                      divider = "| --- | --- | --- | --- | --- | --- |"
                      summary_lines.extend([header, divider])
                      comment_lines.extend([header, divider])
                      for record in records:
                          name = record.get("name", "<unknown>")
                          observed = float(record.get("measurement", 0.0))
                          baseline = float(record.get("baseline", 0.0))
                          threshold = float(record.get("threshold", 0.0))
                          ratio = float(record.get("regression_ratio", float("nan")))
                          if baseline > 0.0 and math.isfinite(ratio):
                              delta_pct = (ratio - 1.0) * 100.0
                              delta_str = f"{delta_pct:+.2f}%"
                          else:
                              delta_str = "n/a"
                          exceeds = bool(record.get("exceeds_budget", False))
                          status = "⚠️ Regression" if exceeds else "✅ Within budget"
                          if exceeds:
                              regression_count += 1
                          row = f"| {name} | {observed:.6f} | {baseline:.6f} | {delta_str} | {threshold:.0%} | {status} |"
                          summary_lines.append(row)
                          comment_lines.append(row)

                      summary_lines.append("")
                      comment_lines.append("")
                      if regression_count:
                          summary_lines.append(f"⚠️ {regression_count} benchmark(s) exceeded the configured thresholds.")
                          comment_lines.append(f"⚠️ {regression_count} benchmark(s) exceeded the configured thresholds.")
                      else:
                          summary_lines.append("✅ All benchmarks remained within the configured thresholds.")
                          comment_lines.append("✅ All benchmarks remained within the configured thresholds.")

          step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if step_summary:
              with open(step_summary, "a", encoding="utf-8") as handle:
                  handle.write("\n".join(summary_lines) + "\n")

          github_output = os.environ.get("GITHUB_OUTPUT")
          if github_output:
              with open(github_output, "a", encoding="utf-8") as handle:
                  handle.write(f"regression_count={regression_count}\n")
                  body = "\n".join(comment_lines)
                  handle.write("comment_body<<'EOF'\n")
                  handle.write(body)
                  handle.write("\nEOF\n")
          PY
      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-reports
          path: |
            reports/benchmarks
            .benchmarks
          if-no-files-found: warn
          retention-days: 7
      - name: Find existing benchmark comment
        if: ${{ always() && github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork }}
        id: find_benchmark_comment
        uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574fdf654e61f9e # v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '### Performance Benchmark Summary'
      - name: Post benchmark summary comment
        if: ${{ always() && github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork && steps.benchmark_summary.outputs.comment_body != '' }}
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find_benchmark_comment.outputs.comment-id }}
          edit-mode: replace
          body: ${{ steps.benchmark_summary.outputs.comment_body }}

  pytest-xdist:
    runs-on: ubuntu-latest
    # Only run on schedule or manual trigger for profiling analysis
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: fast-unit-tests
    timeout-minutes: 30
    name: Pytest Parallel Profiling (xdist)
    steps:
