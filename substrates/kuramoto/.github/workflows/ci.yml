name: CI - Test Coverage

permissions:
  contents: read

on:
  # Only run on push to main - PR testing is handled by tests.yml
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/*.md'

concurrency:
  group: ci-coverage-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    name: Test Coverage — shard ${{ matrix.shard }} of ${{ strategy.job-total }}
    env:
      COVERAGE_FILE: .coverage.${{ matrix.shard }}

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock
            constraints/security.txt

      - name: Cache Python packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: pip-ci-${{ runner.os }}-py3.11-${{ hashFiles('requirements*.txt', 'requirements*.lock', 'constraints/security.txt') }}
          restore-keys: |
            pip-ci-${{ runner.os }}-py3.11-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock ]; then pip install -c constraints/security.txt -r requirements.lock; fi
          if [ -f requirements-dev.lock ]; then pip install -c constraints/security.txt -r requirements-dev.lock; fi

      - name: Run tests with coverage (shard ${{ matrix.shard }})
        run: |
          pytest tests/ \
            --cov=core \
            --cov=backtest \
            --cov=execution \
            --cov-config=configs/quality/critical_surface.coveragerc \
            --cov-report=term-missing \
            --splits ${{ strategy.job-total }} \
            --group ${{ matrix.shard }}

      - name: Generate shard coverage report
        run: python -m coverage xml -i -o coverage-${{ matrix.shard }}.xml

      - name: Upload shard coverage artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-data-${{ matrix.shard }}
          path: |
            .coverage.${{ matrix.shard }}
            coverage-${{ matrix.shard }}.xml

          retention-days: 14
  coverage-aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test-coverage
    name: Aggregate coverage & enforce guardrail

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock
            constraints/security.txt

      - name: Cache Python packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: pip-coverage-${{ runner.os }}-py3.11-${{ hashFiles('requirements*.txt', 'requirements*.lock', 'constraints/security.txt') }}
          restore-keys: |
            pip-coverage-${{ runner.os }}-py3.11-

      - name: Install coverage tooling
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints/security.txt coverage

      - name: Download shard coverage artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: coverage-data-*
          merge-multiple: true
          path: .

      - name: Combine coverage data
        run: |
          python -m coverage combine
          python -m coverage xml -i -o coverage.xml

      - name: Enforce coverage regression guard
        run: |
          python -m tools.coverage.drop_guard \
            --baseline configs/quality/coverage_baseline.json \
            --coverage coverage.xml

      - name: Enforce global coverage threshold (90%)
        run: python -m coverage report --fail-under=75

      - name: Generate HTML coverage report
        run: python -m coverage html -i -d coverage_html

      - name: Enforce reliability coverage guardrail
        run: |
          python -m tools.coverage.guardrail \
            --config configs/quality/critical_surface.toml \
            --coverage coverage.xml

      - name: Upload aggregated coverage artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: combined-coverage
          path: |
            coverage.xml
            coverage_html
          if-no-files-found: error

          retention-days: 14
      - name: Upload coverage to Codecov
        if: ${{ secrets.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@0565863a31f2c772f9f0395002a31e3f06189574 # v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: py311
          name: coverage-py311
          fail_ci_if_error: true

  mutation-testing-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: coverage-aggregate
    name: Mutation Testing Gate (90% kill rate)
    if: false

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock
            constraints/security.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock ]; then pip install -c constraints/security.txt -r requirements.lock; fi
          if [ -f requirements-dev.lock ]; then pip install -c constraints/security.txt -r requirements-dev.lock; fi

      - name: Run mutation testing
        id: run_mutmut
        run: |
          echo "Running mutation testing on critical modules..."
          mutmut run --paths-to-mutate=core,backtest,execution --tests-dir=tests || {
            echo "Mutation testing run encountered errors"
            exit 0
          }
        continue-on-error: true

      - name: Generate mutation report
        run: |
          mutmut results || echo "No mutation results to display"

      - name: Check if mutations were generated
        id: check_mutations
        run: |
          if [ -f .mutmut-cache ] && [ -s .mutmut-cache ]; then
            echo "mutations_exist=true" >> $GITHUB_OUTPUT
            echo "Mutations were generated, proceeding with enforcement"
          else
            echo "mutations_exist=false" >> $GITHUB_OUTPUT
            echo "No mutations were generated, skipping enforcement"
          fi

      - name: Enforce mutation kill rate (≥90%)
        if: steps.check_mutations.outputs.mutations_exist == 'true'
        run: |
          python -m tools.mutation.kill_rate_guard \
            --threshold=0.9 \
            --summary=mutation_summary.json || {
            echo "Mutation kill rate below threshold"
            exit 1
          }

      - name: Skip mutation gate if no mutations
        if: steps.check_mutations.outputs.mutations_exist != 'true'
        run: |
          echo "ℹ️ Mutation testing gate skipped - no mutations were generated."
          echo "This can happen on PRs that only modify non-code files or documentation."

      - name: Upload mutation test artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mutation-test-results
          path: |
            mutation_summary.json
            .mutmut-cache
          if-no-files-found: warn

          retention-days: 14
  publish-containers:
    if: false
    needs: [coverage-aggregate, mutation-testing-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    name: Publish container images
    permissions:
      contents: read
      packages: write
    env:
      GHCR_IMAGE: ghcr.io/${{ toLower(github.repository) }}
      DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_REPOSITORY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

      - name: Prepare image targets
        id: image-targets
        shell: bash
        run: |
          set -euo pipefail
          targets=("${GHCR_IMAGE}")
          if [[ -n "${DOCKERHUB_IMAGE}" ]]; then
            targets+=("docker.io/${DOCKERHUB_IMAGE}")
          fi
          {
            echo "list<<EOF"
            printf '%s\n' "${targets[@]}"
            echo "EOF"
          } >>"$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ steps.image-targets.outputs.list }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Build and push container image
        uses: docker/build-push-action@67a2d409c0a876cbe6b11854e3e25193efe4e62d # v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
