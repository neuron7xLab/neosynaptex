name: Semgrep Security Scan

permissions:
  contents: read
  security-events: write

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  # PRs disabled - security-policy-enforcement.yml provides comprehensive security scanning
  # This reduces CI overhead while maintaining security standards
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday

concurrency:
  group: semgrep-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  semgrep:
    name: Semgrep Scan (Python/TS/Rust/Go)
    runs-on: ubuntu-latest

    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Run Semgrep
        run: |
          # Semgrep auto config covers Python, TypeScript, Rust, Go and more
          semgrep scan \
            --config auto \
            --sarif \
            --output semgrep-results.sarif \
            --severity ERROR \
            --severity WARNING
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@45c373516f557556c15d420e3f5e0aa3d64366bc # v3
        with:
          sarif_file: semgrep-results.sarif

      - name: Check for critical findings
        run: |
          # Parse SARIF and fail on CRITICAL or HIGH severity
          if [ -f semgrep-results.sarif ]; then
            CRITICAL_COUNT=$(jq '[.runs[].results[] | select(.level == "error")] | length' semgrep-results.sarif 2>/dev/null || echo "0")

            if [ "$CRITICAL_COUNT" -gt 0 ]; then
              echo "❌ Found $CRITICAL_COUNT critical/high severity findings"
              echo "Please review and fix these issues before merging"
              exit 1
            else
              echo "✓ No critical/high severity findings"
            fi
          fi
