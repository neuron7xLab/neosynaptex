name: Disabled (progressive-release-gates)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: disabled-progressive-release-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  disabled:
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Disabled workflow
        run: echo "progressive-release-gates.yml disabled during CI stabilization."
