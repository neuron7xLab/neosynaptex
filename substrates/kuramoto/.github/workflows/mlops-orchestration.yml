name: Disabled (mlops-orchestration)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: disabled-mlops-orchestration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  disabled:
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Disabled workflow
        run: echo "mlops-orchestration.yml disabled during CI stabilization."
