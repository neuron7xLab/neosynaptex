name: 'Comprehensive Security Scan'
description: 'Reusable composite action for multi-layer security scanning'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.11'
  scan-secrets:
    description: 'Enable secret scanning'
    required: false
    default: 'true'
  scan-dependencies:
    description: 'Enable dependency scanning'
    required: false
    default: 'true'
  scan-sast:
    description: 'Enable SAST scanning'
    required: false
    default: 'true'
  fail-on-critical:
    description: 'Fail on critical vulnerabilities'
    required: false
    default: 'true'

outputs:
  critical-count:
    description: 'Number of critical vulnerabilities found'
    value: ${{ steps.aggregate.outputs.critical-count }}
  high-count:
    description: 'Number of high vulnerabilities found'
    value: ${{ steps.aggregate.outputs.high-count }}
  scan-passed:
    description: 'Whether all scans passed'
    value: ${{ steps.aggregate.outputs.scan-passed }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      if: inputs.scan-dependencies == 'true' || inputs.scan-sast == 'true'
      uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install security scanning tools
      if: inputs.scan-dependencies == 'true' || inputs.scan-sast == 'true'
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety pip-audit semgrep

    - name: Run secret scanning
      if: inputs.scan-secrets == 'true'
      id: secrets
      shell: bash
      run: |
        echo "Running secret scanning..."
        
        SECRETS_FOUND=0
        
        # Run gitleaks if available
        if command -v gitleaks &> /dev/null; then
          gitleaks detect --no-git --verbose || SECRETS_FOUND=$((SECRETS_FOUND + 1))
        fi
        
        # Run detect-secrets
        if [ -f .secrets.baseline ]; then
          detect-secrets scan --baseline .secrets.baseline || SECRETS_FOUND=$((SECRETS_FOUND + 1))
        fi
        
        echo "secrets_found=$SECRETS_FOUND" >> $GITHUB_OUTPUT
        
        if [ "$SECRETS_FOUND" -gt 0 ]; then
          echo "⚠️  Potential secrets detected"
        else
          echo "✅ No secrets detected"
        fi

    - name: Run SAST scanning
      if: inputs.scan-sast == 'true'
      id: sast
      shell: bash
      run: |
        echo "Running SAST scanning..."
        
        # Run Bandit
        bandit -r . -f json -o bandit-report.json -ll || true
        
        CRITICAL_SAST=$(jq '[.results[] | select(.issue_severity == "HIGH" or .issue_severity == "CRITICAL")] | length' bandit-report.json 2>/dev/null || echo "0")
        
        echo "critical_sast=$CRITICAL_SAST" >> $GITHUB_OUTPUT
        echo "Found $CRITICAL_SAST critical/high SAST findings"

    - name: Run dependency scanning
      if: inputs.scan-dependencies == 'true'
      id: dependencies
      shell: bash
      run: |
        echo "Running dependency scanning..."
        
        # Install dependencies if requirements.txt exists
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt || true
        fi
        
        # Run Safety
        safety check --json --output safety-report.json || true
        
        # Run pip-audit
        pip-audit --desc --format json --output pip-audit-report.json || true
        
        # Count critical vulnerabilities
        CRITICAL_DEPS=0
        
        if [ -f pip-audit-report.json ]; then
          # Exclude known pip vulnerability
          CRITICAL_DEPS=$(jq '[.dependencies[] // empty | select(.vulns != null) | .vulns[] | select(.id != "GHSA-4xh5-x5gv-qwph")] | length' pip-audit-report.json 2>/dev/null || echo "0")
        fi
        
        echo "critical_deps=$CRITICAL_DEPS" >> $GITHUB_OUTPUT
        echo "Found $CRITICAL_DEPS critical dependency vulnerabilities"

    - name: Aggregate scan results
      id: aggregate
      shell: bash
      run: |
        SECRETS_FOUND=${{ steps.secrets.outputs.secrets_found || '0' }}
        CRITICAL_SAST=${{ steps.sast.outputs.critical_sast || '0' }}
        CRITICAL_DEPS=${{ steps.dependencies.outputs.critical_deps || '0' }}
        
        TOTAL_CRITICAL=$((SECRETS_FOUND + CRITICAL_SAST + CRITICAL_DEPS))
        
        echo "critical-count=$TOTAL_CRITICAL" >> $GITHUB_OUTPUT
        echo "high-count=0" >> $GITHUB_OUTPUT
        
        if [ "$TOTAL_CRITICAL" -eq 0 ]; then
          echo "scan-passed=true" >> $GITHUB_OUTPUT
          echo "✅ All security scans passed"
        else
          echo "scan-passed=false" >> $GITHUB_OUTPUT
          echo "❌ Found $TOTAL_CRITICAL critical security issues"
        fi

    - name: Generate security report
      shell: bash
      run: |
        cat > security-scan-report.md <<EOF
        # Security Scan Report
        
        **Generated:** $(date -u +%Y-%m-%dT%H:%M:%SZ)
        
        ## Summary
        
        | Scan Type | Status | Critical Findings |
        |-----------|--------|-------------------|
        | Secret Scanning | ${{ steps.secrets.outputs.secrets_found == '0' && '✅' || '❌' }} | ${{ steps.secrets.outputs.secrets_found || '0' }} |
        | SAST Analysis | ${{ steps.sast.outputs.critical_sast == '0' && '✅' || '❌' }} | ${{ steps.sast.outputs.critical_sast || '0' }} |
        | Dependency Scan | ${{ steps.dependencies.outputs.critical_deps == '0' && '✅' || '❌' }} | ${{ steps.dependencies.outputs.critical_deps || '0' }} |
        
        **Total Critical Issues:** ${{ steps.aggregate.outputs.critical-count }}
        
        ## Recommendations
        
        - Review all critical findings immediately
        - Update vulnerable dependencies
        - Remove any exposed secrets
        - Fix high-severity code issues
        
        EOF
        
        cat security-scan-report.md

    - name: Upload security reports
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: security-scan-reports
        path: |
          bandit-report.json
          safety-report.json
          pip-audit-report.json
          security-scan-report.md
        if-no-files-found: warn

    - name: Fail on critical issues
      if: inputs.fail-on-critical == 'true' && steps.aggregate.outputs.scan-passed == 'false'
      shell: bash
      run: |
        echo "❌ Security scan failed with ${{ steps.aggregate.outputs.critical-count }} critical issues"
        exit 1
