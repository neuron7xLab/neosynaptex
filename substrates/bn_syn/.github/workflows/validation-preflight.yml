name: validation-preflight

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validation-preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validation-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements-lock.txt

      - name: Pin pip
        uses: ./.github/actions/pin-pip

      - name: Install
        run: python -m pip install -e ".[dev,test]"

      - name: Run validation preflight
        run: ./scripts/preflight.sh

      - name: Write summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ validation-preflight passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ validation-preflight failed; inspect step logs for explicit failing gate" >> "$GITHUB_STEP_SUMMARY"
          fi
