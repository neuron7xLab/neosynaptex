name: dependency-review

on:
  pull_request:
    paths:
      - "pyproject.toml"
      - "requirements*.txt"
      - "requirements/**/*.txt"
      - "setup.py"
      - "setup.cfg"
      - "poetry.lock"
      - "uv.lock"
      - "Pipfile"
      - "Pipfile.lock"

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Detect dependency graph availability
        id: depgraph
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          status_code="$(curl -sS -o /tmp/sbom.json -w '%{http_code}' \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GH_REPO}/dependency-graph/sbom")"

          if [ "${status_code}" = "200" ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
            echo "Dependency graph endpoint is available (HTTP 200)."
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "Dependency graph endpoint unavailable (HTTP ${status_code}); dependency-review skipped."
          fi

      - name: Dependency Review
        if: steps.depgraph.outputs.enabled == 'true'
        uses: actions/dependency-review-action@3c4e3dcb1aa7874d2c16be7d79418e9b7efd6261

      - name: Dependency Review skipped notice
        if: steps.depgraph.outputs.enabled != 'true'
        run: |
          echo "Dependency graph is disabled or unavailable; skipping dependency-review action."
