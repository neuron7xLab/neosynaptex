name: Unicode Security Lint

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  unicode-lint:
    name: Check for dangerous Unicode
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.x'

      - name: Run Unicode lint
        id: unicode_lint
        run: |
          python tools/unicode_lint.py "." 2>&1 | tee unicode_scan_report.txt
          exit "${PIPESTATUS[0]}"

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: unicode-scan-report
          path: unicode_scan_report.txt
          retention-days: 30
