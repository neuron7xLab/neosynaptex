name: Dependency Audit

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'requirements*.txt'
      - 'setup.py'
      - 'pyproject.toml'
  push:
    branches: [main]
    paths:
      - 'requirements*.txt'
      - 'setup.py'
      - 'pyproject.toml'

permissions:
  contents: read

# Note: GitHub Dependency Review requires enabling Dependency Graph in repo settings.
# Until then, this workflow uses pip-audit for Python dependency vulnerability scanning.

jobs:
  dependency-audit:
    name: Audit Python dependencies for vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.x'

      - name: Install pip-audit
        run: pip install pip-audit==2.7.3

      - name: Audit requirements.txt
        id: audit-requirements
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --format json --output /tmp/audit-requirements.json 2>&1 | tee /tmp/audit-requirements.txt
          else
            echo "No requirements.txt found, skipping"
          fi

      - name: Audit requirements-dev.txt
        id: audit-dev
        run: |
          if [ -f requirements-dev.txt ]; then
            pip-audit -r requirements-dev.txt --format json --output /tmp/audit-dev.json 2>&1 | tee /tmp/audit-dev.txt
          else
            echo "No requirements-dev.txt found, skipping"
          fi

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pip-audit-reports
          path: /tmp/audit-*
          retention-days: 30
          if-no-files-found: ignore
