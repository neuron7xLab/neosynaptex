name: Security - Dependency Audit

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.x'

      - name: Install pip-audit
        run: pip install pip-audit==2.7.3

      - name: Run pip-audit
        run: |
          set -o pipefail
          status=0
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --format json --output pip-audit-requirements.json || status=$?
            pip-audit -r requirements.txt > pip-audit-requirements.txt || status=$?
          else
            echo "No requirements.txt found, skipping"
          fi

          if [ -f requirements-dev.txt ]; then
            pip-audit -r requirements-dev.txt --format json --output pip-audit-requirements-dev.json || status=$?
            pip-audit -r requirements-dev.txt > pip-audit-requirements-dev.txt || status=$?
          else
            echo "No requirements-dev.txt found, skipping"
          fi

          exit $status

      - name: Upload audit reports
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pip-audit-reports
          path: |
            pip-audit-*.json
            pip-audit-*.txt
          retention-days: 30
          if-no-files-found: ignore
