repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: detect-private-key

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        args: ["--line-length", "100"]

  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: ["--max-line-length=100", "--exclude=venv,venv-dev,build,dist"]

  - repo: local
    hooks:
      - id: unicode-scan
        name: Unicode Trojan scan
        entry: python scripts/unicode_scan.py
        language: system
        types_or: [python, yaml, markdown]
      - id: gitleaks-protect
        name: gitleaks secrets scan
        entry: gitleaks protect --staged --config .gitleaks.toml --redact
        language: system
        pass_filenames: false
        always_run: true
