name: CI Reusable

on:
  workflow_call:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  verify:
    name: VERIFY_CORE
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev
      - run: uv run python scripts/dev_doctor.py
      - run: uv run pytest tests/ -q --timeout=300
      - name: CAUSAL_VALIDATION
        run: uv run pytest tests/test_causal_invariants.py tests/test_causal_config_sync.py -v --timeout=120
      - run: uv run lint-imports
      - run: uv run python scripts/verify_matrix.py

  verify_ml:
    name: VERIFY_ML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev --extra ml
      - run: uv run python -c "import torch; import mycelium_fractal_net as mfn; assert mfn.MyceliumFractalNet is not None"

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev
      - run: uv run python validation/run_validation_experiments.py

  benchmark_core:
    name: BENCHMARK_CORE_ML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev --extra ml
      - run: uv run python benchmarks/benchmark_core.py

  benchmark_quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev
      - run: uv run python benchmarks/benchmark_quality.py

  showcase_generation:
    name: SHOWCASE_GENERATION
    runs-on: ubuntu-latest
    needs: [verify, validate, benchmark_core, benchmark_quality]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev
      - run: uv run python scripts/showcase_run.py
      - uses: actions/upload-artifact@v4
        with:
          name: showcase-generation
          path: |
            artifacts/showcase/
            artifacts/release/

  baseline_parity:
    name: BASELINE_PARITY
    runs-on: ubuntu-latest
    needs: [verify, validate, benchmark_core, benchmark_quality]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev
      - run: uv run python scripts/showcase_run.py
      - run: uv run python scripts/baseline_parity.py
      - uses: actions/upload-artifact@v4
        with:
          name: baseline-parity-evidence
          path: |
            artifacts/showcase/
            artifacts/evidence/wave_8/baseline_parity_report.json
            docs/contracts/showcase_run.etalon.json
            docs/contracts/showcase_run.etalon.sha256

  neurochem_contracts:
    name: NEUROCHEM_CONTRACTS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev
      - run: uv run pytest -q tests/test_neuromodulation_completion.py tests/test_schema_roundtrip_completion.py tests/test_contract_hardening_completion.py

  scientific_controls:
    name: SCIENTIFIC_CONTROLS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev
      - run: uv run python validation/neurochem_controls.py

  openapi_export:
    name: OPENAPI_EXPORT
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev
      - run: uv run python scripts/export_openapi.py
      - run: uv run python scripts/check_openapi_contract.py
      - uses: actions/upload-artifact@v4
        with:
          name: openapi-v2
          path: |
            artifacts/evidence/wave_4/openapi.v2.json
            artifacts/evidence/wave_4/openapi_contract_report.json

  docs_drift:
    name: DOCS_DRIFT
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev
      - run: uv run python scripts/docs_drift_check.py

  artifact_attestation:
    name: ARTIFACT_ATTESTATION
    runs-on: ubuntu-latest
    needs: [showcase_generation, baseline_parity, neurochem_contracts, scientific_controls, openapi_export, docs_drift]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev
      - run: |
          uv run python benchmarks/benchmark_core.py
          uv run python benchmarks/benchmark_quality.py
          uv run python validation/run_validation_experiments.py
          uv run python validation/neurochem_controls.py
          uv run python scripts/showcase_run.py
          uv run python scripts/baseline_parity.py
          uv run python scripts/export_openapi.py
          uv run python scripts/check_openapi_contract.py
          uv run python scripts/generate_sbom.py
          uv run python scripts/docs_drift_check.py
      - run: uv run python scripts/attest_artifacts.py
      - uses: actions/upload-artifact@v4
        with:
          name: mfn-evidence
          path: |
            artifacts/evidence/
            artifacts/release/
            benchmarks/results/
