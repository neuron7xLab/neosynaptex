<svg xmlns="http://www.w3.org/2000/svg" width="600" height="8" viewBox="0 0 600 8">
  <defs>
    <linearGradient id="syn1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0">
        <animate attributeName="offset" values="-0.2;1.0" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="5%" stop-color="#00e5ff" stop-opacity="0.9">
        <animate attributeName="offset" values="-0.15;1.05" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="10%" stop-color="#00e5ff" stop-opacity="0">
        <animate attributeName="offset" values="-0.1;1.1" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="syn2" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#b388ff" stop-opacity="0">
        <animate attributeName="offset" values="-0.2;1.0" dur="4.5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="5%" stop-color="#b388ff" stop-opacity="0.7">
        <animate attributeName="offset" values="-0.15;1.05" dur="4.5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="10%" stop-color="#b388ff" stop-opacity="0">
        <animate attributeName="offset" values="-0.1;1.1" dur="4.5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="g">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <line x1="0" y1="4" x2="600" y2="4" stroke="#1a1a2e" stroke-width="0.5"/>
  <line x1="0" y1="4" x2="600" y2="4" stroke="url(#syn1)" stroke-width="1.5" filter="url(#g)"/>
  <line x1="0" y1="4" x2="600" y2="4" stroke="url(#syn2)" stroke-width="1.2" filter="url(#g)"/>
</svg>