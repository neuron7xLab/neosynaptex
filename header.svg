<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.15">
        <animate attributeName="stop-opacity" values="0.15;0.25;0.15" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#b388ff"/>
      <stop offset="100%" stop-color="#00e5ff"/>
      <animate attributeName="x1" values="0;-0.5;0" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1;1.5;1" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Animated ring -->
    <clipPath id="ringClip">
      <circle cx="400" cy="85" r="55"/>
    </clipPath>
  </defs>

  <!-- Background glow -->
  <rect width="800" height="200" fill="#0d1117"/>
  <ellipse cx="400" cy="85" rx="300" ry="80" fill="url(#core)"/>

  <!-- Orbital rings -->
  <ellipse cx="400" cy="85" rx="65" ry="25" fill="none" stroke="#00e5ff" stroke-width="0.6" opacity="0.4" transform="rotate(-20 400 85)">
    <animate attributeName="rx" values="65;70;65" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="400" cy="85" rx="60" ry="22" fill="none" stroke="#b388ff" stroke-width="0.6" opacity="0.3" transform="rotate(25 400 85)">
    <animate attributeName="rx" values="60;55;60" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="400" cy="85" rx="50" ry="18" fill="none" stroke="#00ff41" stroke-width="0.4" opacity="0.2" transform="rotate(0 400 85)">
    <animate attributeName="ry" values="18;22;18" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="3.5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Core node -->
  <circle cx="400" cy="85" r="8" fill="#00e5ff" opacity="0.9" filter="url(#softglow)">
    <animate attributeName="r" values="8;10;8" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;1;0.9" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="85" r="3" fill="#ffffff" opacity="0.95"/>

  <!-- Satellite nodes (4 subsystems) -->
  <!-- BN-Syn (spike) -->
  <circle cx="335" cy="70" r="4" fill="#ff6b6b" opacity="0.8" filter="url(#glow)">
    <animate attributeName="cx" values="335;332;335" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="70;72;70" dur="4s" repeatCount="indefinite"/>
  </circle>
  <!-- MFN (morpho) -->
  <circle cx="370" cy="108" r="4" fill="#00ff41" opacity="0.8" filter="url(#glow)">
    <animate attributeName="cx" values="370;373;370" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="108;105;108" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <!-- PsycheCore -->
  <circle cx="430" cy="62" r="4" fill="#b388ff" opacity="0.8" filter="url(#glow)">
    <animate attributeName="cx" values="430;427;430" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="62;65;62" dur="5s" repeatCount="indefinite"/>
  </circle>
  <!-- Market -->
  <circle cx="465" cy="100" r="4" fill="#ffab00" opacity="0.8" filter="url(#glow)">
    <animate attributeName="cx" values="465;468;465" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="100;97;100" dur="4.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Connection lines to core -->
  <line x1="335" y1="70" x2="396" y2="83" stroke="#ff6b6b" stroke-width="0.5" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
  </line>
  <line x1="370" y1="108" x2="398" y2="88" stroke="#00ff41" stroke-width="0.5" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3.5s" repeatCount="indefinite"/>
  </line>
  <line x1="430" y1="62" x2="404" y2="82" stroke="#b388ff" stroke-width="0.5" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="5s" repeatCount="indefinite"/>
  </line>
  <line x1="465" y1="100" x2="406" y2="87" stroke="#ffab00" stroke-width="0.5" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4.5s" repeatCount="indefinite"/>
  </line>

  <!-- Title -->
  <text x="400" y="160" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="url(#titleGrad)" filter="url(#glow)" letter-spacing="6">
    NEOSYNAPTEX
  </text>

  <!-- Subtitle -->
  <text x="400" y="182" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e" letter-spacing="2">
    NFI INTEGRATING MIRROR LAYER
  </text>
</svg>