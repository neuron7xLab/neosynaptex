[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "neosynaptex"
version = "0.2.0"
description = "NFI integrating mirror layer -- cross-domain coherence diagnostics with bootstrap CI, Granger causality, anomaly isolation, phase portraits, and reflexive modulation"
readme = "README.md"
authors = [{ name = "Yaroslav Vasylenko", email = "neuron7x@proton.me" }]
license = { text = "AGPL-3.0-or-later" }
requires-python = ">=3.10"
keywords = [
    "neuroscience",
    "criticality",
    "coherence",
    "scaling",
    "metastability",
    "gamma",
    "jacobian",
    "granger-causality",
    "phase-transition",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: GNU Affero General Public License v3 or later (AGPLv3+)",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Scientific/Engineering :: Bio-Informatics",
    "Typing :: Typed",
]
dependencies = [
    "numpy>=1.24",
    "scipy>=1.10",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "mypy>=1.0",
    "ruff>=0.3",
]

[project.urls]
Repository = "https://github.com/neuron7xLab/neosynaptex"
Issues = "https://github.com/neuron7xLab/neosynaptex/issues"

[tool.pytest.ini_options]
testpaths = ["."]
filterwarnings = ["ignore::RuntimeWarning"]

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM"]
