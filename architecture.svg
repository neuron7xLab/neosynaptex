<svg xmlns="http://www.w3.org/2000/svg" width="700" height="320" viewBox="0 0 700 320">
  <defs>
    <filter id="gl">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gl3">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="a" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5" fill="none" stroke="#00e5ff" stroke-width="0.7"/>
    </marker>
    <marker id="amod" markerWidth="6" markerHeight="5" refX="0" refY="2.5" orient="auto">
      <path d="M6,0 L0,2.5 L6,5" fill="none" stroke="#b388ff" stroke-width="0.7"/>
    </marker>
  </defs>

  <rect width="700" height="320" fill="#0d1117" rx="8"/>

  <!-- Input adapters (left) -->
  <!-- BN-Syn -->
  <rect x="30" y="30" width="130" height="44" rx="6" fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.7"/>
  <text x="95" y="48" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#ff6b6b">BN-Syn</text>
  <text x="95" y="64" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">spike domain</text>

  <!-- MFN+ -->
  <rect x="30" y="95" width="130" height="44" rx="6" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.7"/>
  <text x="95" y="113" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#00ff41">MFN+</text>
  <text x="95" y="129" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">morpho domain</text>

  <!-- PsycheCore -->
  <rect x="30" y="160" width="130" height="44" rx="6" fill="none" stroke="#b388ff" stroke-width="1" opacity="0.7"/>
  <text x="95" y="178" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#b388ff">PsycheCore</text>
  <text x="95" y="194" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">psyche domain</text>

  <!-- mvstack -->
  <rect x="30" y="225" width="130" height="44" rx="6" fill="none" stroke="#ffab00" stroke-width="1" opacity="0.7"/>
  <text x="95" y="243" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#ffab00">mvstack</text>
  <text x="95" y="259" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">market domain</text>

  <!-- Arrows to core -->
  <line x1="160" y1="52" x2="255" y2="120" stroke="#ff6b6b" stroke-width="0.8" opacity="0.5" marker-end="url(#a)">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
  </line>
  <line x1="160" y1="117" x2="255" y2="140" stroke="#00ff41" stroke-width="0.8" opacity="0.5" marker-end="url(#a)">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3.5s" repeatCount="indefinite"/>
  </line>
  <line x1="160" y1="182" x2="255" y2="160" stroke="#b388ff" stroke-width="0.8" opacity="0.5" marker-end="url(#a)">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
  </line>
  <line x1="160" y1="247" x2="255" y2="178" stroke="#ffab00" stroke-width="0.8" opacity="0.5" marker-end="url(#a)">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4.5s" repeatCount="indefinite"/>
  </line>

  <!-- Core: observe() -->
  <rect x="260" y="100" width="180" height="100" rx="10" fill="none" stroke="#00e5ff" stroke-width="1.5" filter="url(#gl)">
    <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
  </rect>
  <text x="350" y="125" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#00e5ff">neosynaptex</text>
  <text x="350" y="145" text-anchor="middle" font-family="monospace" font-size="10" fill="#00e5ff" opacity="0.6">.observe()</text>
  <line x1="280" y1="155" x2="420" y2="155" stroke="#1a2332" stroke-width="0.5"/>
  <text x="350" y="173" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">gamma + sr + granger</text>
  <text x="350" y="186" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">anomaly + portrait + mod</text>

  <!-- Pulsing core dot -->
  <circle cx="350" cy="105" r="3" fill="#00e5ff" filter="url(#gl3)">
    <animate attributeName="r" values="2;4;2" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Output: NeosynaptexState -->
  <rect x="510" y="70" width="160" height="160" rx="8" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.5"/>
  <text x="590" y="92" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#00e5ff">NeosynaptexState</text>
  <line x1="525" y1="100" x2="655" y2="100" stroke="#1a2332" stroke-width="0.5"/>
  <text x="530" y="116" font-family="monospace" font-size="8" fill="#8b949e">gamma_mean</text>
  <text x="530" y="130" font-family="monospace" font-size="8" fill="#8b949e">spectral_radius</text>
  <text x="530" y="144" font-family="monospace" font-size="8" fill="#8b949e">cross_coherence</text>
  <text x="530" y="158" font-family="monospace" font-size="8" fill="#8b949e">phase</text>
  <text x="530" y="172" font-family="monospace" font-size="8" fill="#8b949e">granger_graph</text>
  <text x="530" y="186" font-family="monospace" font-size="8" fill="#8b949e">anomaly_score</text>
  <text x="530" y="200" font-family="monospace" font-size="8" fill="#8b949e">modulation</text>
  <text x="530" y="214" font-family="monospace" font-size="8" fill="#8b949e">portrait</text>

  <!-- Arrow core -> state -->
  <line x1="440" y1="150" x2="508" y2="150" stroke="#00e5ff" stroke-width="0.8" marker-end="url(#a)" opacity="0.6"/>

  <!-- Modulation feedback arrows (dashed, back to adapters) -->
  <line x1="270" y1="200" x2="155" y2="245" stroke="#b388ff" stroke-width="0.6" stroke-dasharray="4,3" opacity="0.35" marker-end="url(#amod)"/>
  <line x1="270" y1="200" x2="155" y2="190" stroke="#b388ff" stroke-width="0.6" stroke-dasharray="4,3" opacity="0.35" marker-end="url(#amod)"/>
  <line x1="270" y1="200" x2="155" y2="125" stroke="#b388ff" stroke-width="0.6" stroke-dasharray="4,3" opacity="0.35" marker-end="url(#amod)"/>
  <line x1="270" y1="200" x2="155" y2="55" stroke="#b388ff" stroke-width="0.6" stroke-dasharray="4,3" opacity="0.35" marker-end="url(#amod)"/>

  <!-- Modulation label -->
  <text x="200" y="290" text-anchor="middle" font-family="monospace" font-size="8" fill="#b388ff" opacity="0.5">modulation feedback</text>

  <!-- Evidence output -->
  <rect x="510" y="255" width="160" height="36" rx="6" fill="none" stroke="#00ff41" stroke-width="0.8" opacity="0.5"/>
  <text x="590" y="271" text-anchor="middle" font-family="monospace" font-size="10" fill="#00ff41" opacity="0.7">export_proof()</text>
  <text x="590" y="284" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e" opacity="0.5">JSON evidence bundle</text>

  <line x1="590" y1="230" x2="590" y2="253" stroke="#00ff41" stroke-width="0.6" opacity="0.4" marker-end="url(#a)"/>
</svg>