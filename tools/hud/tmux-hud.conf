# ╔═══════════════════════════════════════════════════════════════════╗
# ║  NEOSYNAPTEX COSMO-NEURAL HUD — tmux layer                       ║
# ║  Source: tools/hud/tmux-hud.conf                                  ║
# ╚═══════════════════════════════════════════════════════════════════╝

# ── True color ───────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,gnome*:RGB"

# ── Core ─────────────────────────────────────────────────────────────
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 10
set -g focus-events on

# ── Splits (current path) ───────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Palette ──────────────────────────────────────────────────────────
# void:    #050505
# field:   #111111 / #1C1C1C
# cyan:    #00F0FF
# magenta: #FF006E
# green:   #00FF9C
# red:     #FF3B3B
# amber:   #FFB000
# dim:     #505570
# fg:      #C8C8D2

# ── Status bar ───────────────────────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#0A0A0F,fg=#505570"

# Left: session + indicator
set -g status-left-length 40
set -g status-left "#[fg=#00F0FF,bold] ⟡ NEO #[fg=#505570]│ #[fg=#FF006E]#S #[fg=#505570]│ "

# Right: git branch + time
set -g status-right-length 60
set -g status-right "#[fg=#505570]│ #[fg=#00F0FF]#(cd #{pane_current_path} && git symbolic-ref --short HEAD 2>/dev/null || echo '∅') #[fg=#505570]│ #[fg=#C8C8D2]%H:%M "

# Windows
set -g window-status-format "#[fg=#505570] #I:#W "
set -g window-status-current-format "#[fg=#00F0FF,bold] #I:#W "
set -g window-status-separator ""

# ── Panes ────────────────────────────────────────────────────────────
set -g pane-border-style "fg=#1C1C1C"
set -g pane-active-border-style "fg=#00F0FF"

# ── Messages ─────────────────────────────────────────────────────────
set -g message-style "bg=#111111,fg=#00F0FF"
set -g message-command-style "bg=#111111,fg=#FF006E"

# ── Selection / copy mode ────────────────────────────────────────────
setw -g mode-style "bg=#1C1C1C,fg=#00F0FF"

# ── Clock ────────────────────────────────────────────────────────────
setw -g clock-mode-colour "#00F0FF"

# ── Session persistence ─────────────────────────────────────────────
set -g @resurrect-capture-pane-contents 'on'
bind C-s run-shell "tmux capture-pane -p > ~/.local/share/tmux-last-session.txt; tmux display 'Session saved'"
