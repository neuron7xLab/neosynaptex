# NEOSYNAPTEX COSMO-NEURAL HUD central configuration.
# shellcheck shell=bash

# Palette (hex) tuned for low-noise cockpit rendering.
NEO_HUD_COLOR_VOID="#050505"
NEO_HUD_COLOR_FIELD="#111111"
NEO_HUD_COLOR_FIELD_2="#1C1C1C"
NEO_HUD_COLOR_SIGNAL="#00F0FF"
NEO_HUD_COLOR_ANOMALY="#FF006E"
NEO_HUD_COLOR_STABLE="#00FF9C"
NEO_HUD_COLOR_WARNING="#FFB000"
NEO_HUD_COLOR_DANGER="#FF3B3B"
NEO_HUD_COLOR_FOREGROUND="#EAEAEA"
NEO_HUD_COLOR_DIM="#5E6478"

# Behavior knobs.
NEO_HUD_VERIFY_STALE_SECONDS=1800
NEO_HUD_TRACK_FILE="${HOME}/.cache/neosynaptex-hud/last_action.tsv"
NEO_HUD_STATE_FILE="${HOME}/.cache/neosynaptex-hud/state.tsv"
