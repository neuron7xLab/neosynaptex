# GEOSYNC-ACCEL — LLVM Optimization Flags (2026 Standard)
#
# These flags enable aggressive LLVM vectorization and loop optimization.
# For distribution via PyPI wheels, do NOT set target-cpu=native here;
# instead rely on runtime SIMD dispatch (Function Multi-Versioning).
#
# NOTE: Polyhedral optimizer (-polly) requires a custom LLVM build with Polly.
# The flags below use standard LLVM passes available in all rustc distributions.
# To enable Polly, rebuild rustc with Polly support and uncomment the flags.

[build]
rustflags = [
    # Standard LLVM loop optimizations
    "-C", "llvm-args=--enable-loopinterchange",
    "-C", "llvm-args=--enable-loop-flatten",
    "-C", "llvm-args=--inline-threshold=275",
    # Vectorizer tuning
    "-C", "llvm-args=--vectorize-loops",
    "-C", "llvm-args=--vectorize-slp",
]

