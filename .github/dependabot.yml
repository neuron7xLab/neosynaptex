# Dependabot — weekly dependency updates across every ecosystem
# actually present in the repo. Version drift is *distinct* from the
# automated security updates toggle (which opens PRs reactively when a
# CVE lands): this config keeps deps rotating on a steady cadence so
# drift-induced vulnerabilities are closed before they accumulate.
#
# Ecosystem coverage rationale
# ----------------------------
#   pip             — the Python kernel (pyproject.toml)
#   github-actions  — all workflows under .github/workflows/
#   npm (x2)        — the two JS/TS subprojects under substrates/kuramoto:
#                     apps/web (Next.js + MUI)
#                     ui/dashboard (Playwright + ESLint toolchain)
#                   These were previously unmanaged, which is how the
#                   initial Dependabot scan surfaced a backlog of Next.js
#                   CVEs. They are on pip's cadence but offset by an
#                   hour per ecosystem so the daily PR wave is spread.

version: 2

updates:
  # ── Python ──────────────────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
    groups:
      dev-toolchain:
        patterns:
          - "ruff"
          - "mypy"
          - "pytest*"
          - "hypothesis"
          - "pre-commit"
          - "pip-audit"
      scientific-stack:
        patterns:
          - "numpy"
          - "scipy"
          - "pandas"
          - "scikit-learn"
          - "networkx"
    allow:
      - dependency-type: "direct"
    ignore:
      # Never silently bump major versions for the scientific stack;
      # require an explicit human-authored commit for majors.
      - dependency-name: "numpy"
        update-types: ["version-update:semver-major"]
      - dependency-name: "scipy"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions ──────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"

  # ── npm: substrates/kuramoto/apps/web (Next.js) ─────────────────────
  - package-ecosystem: "npm"
    directory: "/substrates/kuramoto/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(web)"
      include: "scope"
    labels:
      - "dependencies"
      - "javascript"
      - "substrate:web"
    groups:
      mui-stack:
        patterns:
          - "@mui/*"
          - "@emotion/*"
      test-toolchain:
        patterns:
          - "@playwright/*"
          - "@axe-core/*"
          - "jest*"
          - "@types/jest"
      lint-toolchain:
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"
          - "prettier*"
    allow:
      - dependency-type: "direct"

  # ── npm: substrates/kuramoto/ui/dashboard (Playwright + ESLint) ─────
  - package-ecosystem: "npm"
    directory: "/substrates/kuramoto/ui/dashboard"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps(dashboard)"
      include: "scope"
    labels:
      - "dependencies"
      - "javascript"
      - "substrate:dashboard"
    groups:
      lint-toolchain:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "typescript-eslint"
          - "globals"
      test-toolchain:
        patterns:
          - "@playwright/*"
          - "@axe-core/*"
    allow:
      - dependency-type: "direct"
