<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    <radialGradient id="pulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.6">
        <animate attributeName="stop-opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="200" fill="#0d1117"/>
  <!-- Constellation dots -->
  <g fill="#7c3aed" opacity="0.4">
    <circle cx="80" cy="40" r="1.5"/><circle cx="150" cy="80" r="1"/><circle cx="220" cy="30" r="1.5"/>
    <circle cx="310" cy="60" r="1"/><circle cx="400" cy="25" r="2"/><circle cx="500" cy="55" r="1"/>
    <circle cx="580" cy="35" r="1.5"/><circle cx="650" cy="70" r="1"/><circle cx="720" cy="45" r="1.5"/>
    <circle cx="100" cy="160" r="1"/><circle cx="200" cy="170" r="1.5"/><circle cx="600" cy="165" r="1"/>
    <circle cx="700" cy="155" r="1.5"/><circle cx="350" cy="175" r="1"/><circle cx="450" cy="168" r="1"/>
  </g>
  <!-- Connection lines -->
  <g stroke="#7c3aed" stroke-width="0.5" opacity="0.2">
    <line x1="80" y1="40" x2="150" y2="80"/><line x1="150" y1="80" x2="220" y2="30"/>
    <line x1="220" y1="30" x2="310" y2="60"/><line x1="310" y1="60" x2="400" y2="25"/>
    <line x1="500" y1="55" x2="580" y2="35"/><line x1="580" y1="35" x2="650" y2="70"/>
    <line x1="650" y1="70" x2="720" y2="45"/>
  </g>
  <!-- Central glow -->
  <ellipse cx="400" cy="90" rx="200" ry="60" fill="url(#pulse)"/>
  <!-- Gamma symbol -->
  <text x="400" y="78" text-anchor="middle" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="url(#glow)" filter="url(#blur)">gamma = 1.0</text>
  <text x="400" y="78" text-anchor="middle" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="url(#glow)">gamma = 1.0</text>
  <!-- Title -->
  <text x="400" y="118" text-anchor="middle" font-family="monospace" font-size="28" fill="#e2e8f0" letter-spacing="8">NEOSYNAPTEX</text>
  <!-- Subtitle -->
  <text x="400" y="148" text-anchor="middle" font-family="monospace" font-size="12" fill="#94a3b8">NFI Integrating Mirror Layer</text>
  <!-- Six dots for substrates -->
  <g transform="translate(400, 170)">
    <circle cx="-100" cy="0" r="4" fill="#10b981" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-60" cy="0" r="4" fill="#3b82f6" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-20" cy="0" r="4" fill="#8b5cf6" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="0" r="4" fill="#f59e0b" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="0" r="4" fill="#ef4444" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="0" r="4" fill="#ec4899" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Substrate labels -->
  <g font-family="monospace" font-size="7" fill="#64748b" text-anchor="middle" transform="translate(400, 184)">
    <text x="-100">ZF</text><text x="-60">RD</text><text x="-20">SN</text>
    <text x="20">MK</text><text x="60">NX</text><text x="100">AI</text>
  </g>
</svg>
