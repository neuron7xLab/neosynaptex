name: kill_signal_coverage

# Ratchet: the count of kill-signals with
# ``measurement_status: instrumented`` in
# ``docs/SYSTEM_PROTOCOL.md`` MUST never fall below the baseline
# recorded in ``tools/audit/kill_signal_baseline.json``, and every
# instrumented entry MUST point at an on-disk
# ``signal_contract.tool`` and ``signal_contract.test_suite``.
#
# Adding instrumentation for a previously prose-only kill-signal is
# a single PR that: (a) lands the tool + test + workflow, (b)
# transitions the frontmatter entry to ``instrumented``, and (c)
# bumps ``min_instrumented_count`` in the baseline JSON. Regression
# requires an explicit diff to the baseline file, visible at review.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Run kill-signal coverage ratchet
        run: python -m tools.audit.kill_signal_coverage
