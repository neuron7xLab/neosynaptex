name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip

      - name: Install tools
        run: pip install pip-audit bandit --quiet

      - name: Bandit SAST
        run: bandit -r core/ contracts/ neosynaptex.py -q --skip B101 -f json -o bandit-report.json

      - name: Bandit summary
        if: always()
        run: bandit -r core/ contracts/ neosynaptex.py -q --skip B101

      - name: pip-audit dependency scan
        run: pip install -e ".[dev]" --quiet && pip-audit --desc --skip-editable

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: bandit-report.json
          if-no-files-found: ignore
          retention-days: 90

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -fsSL --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 60 \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" \
            -o /tmp/gitleaks_checksums.txt
          curl -fsSL --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 60 \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          grep -E "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz\$" /tmp/gitleaks_checksums.txt > /tmp/gitleaks.sha256
          test -s /tmp/gitleaks.sha256
          sha256sum -c /tmp/gitleaks.sha256
          tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Run gitleaks
        run: gitleaks detect --source . --redact --report-format sarif --report-path gitleaks.sarif
      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks.sarif
          if-no-files-found: ignore
          retention-days: 30
