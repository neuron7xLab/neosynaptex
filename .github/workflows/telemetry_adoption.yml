name: telemetry_adoption

# Declarative gate: every production call site of
# tools.telemetry.emit.{emit_event, span} outside tests/ MUST be
# listed in tools/telemetry/adoption_manifest.yaml. A PR that adds
# an emit site without updating the manifest, or removes an
# emit site without removing the manifest entry, fails here.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Run telemetry adoption check
        run: python -m tools.audit.telemetry_adoption
