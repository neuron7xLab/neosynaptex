name: canon_reference_check

# Every backticked path-like reference inside a canonical document
# MUST point at a file or directory that exists on disk, unless it
# is explicitly allow-listed in
# ``tools/audit/canon_reference_allowlist.yaml`` as a
# not-required-at-scaffold-commit artefact.
#
# Catches the class of spec↔code drift fixed manually in PR #87
# (``stamp_commit_sha`` referenced a function at a path that never
# existed).

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Run canon-reference check
        run: python -m tools.audit.canon_reference_check
