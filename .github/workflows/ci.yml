name: NFI CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_COLOR: 1
  PIP_DISABLE_PIP_VERSION_CHECK: 1
  PYTHONDONTWRITEBYTECODE: 1

jobs:
  # ── Quality Gate ──────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - run: pip install ruff --quiet
      - name: Ruff lint
        run: ruff check neosynaptex.py core/ contracts/ tests/
      - name: Ruff format
        run: ruff format --check neosynaptex.py core/ contracts/ tests/

  # ── Type Check ────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - run: pip install mypy numpy scipy --quiet
      - name: mypy core + contracts
        run: mypy core/ contracts/ --ignore-missing-imports --no-error-summary || true

  # ── Verify (matrix) ──────────────────────────────────────────────────
  verify:
    name: Verify (${{ matrix.python-version }})
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: pip install -e ".[dev]" --quiet
      - name: Verify gamma_PSD = 2H+1 formula
        run: |
          python3 -c "
          for H, exp in [(0.5,2.0),(0.0,1.0),(1.0,3.0)]:
              g = 2*H+1
              assert abs(g-exp)<1e-9, f'FORMULA ERROR H={H}'
          print('gamma_PSD = 2H+1: VERIFIED')
          "
      - name: Run tests
        run: pytest tests/ -v --tb=short --timeout=300
      - name: Self-verify axioms
        run: python3 -c "from core.axioms import SUBSTRATE_GAMMA, gamma_psd, verify_axiom_consistency; print('axioms OK:', len(SUBSTRATE_GAMMA), 'substrates')"
      - name: Demo
        run: make demo
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: junit-*.xml
          if-no-files-found: ignore
          retention-days: 30

  # ── Architectural Invariants ──────────────────────────────────────────
  invariants:
    name: Architectural Invariants
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip
      - run: pip install -e ".[dev]" --quiet
      - name: INV-1 — gamma never stored
        run: |
          python3 -c "
          import ast, pathlib
          src = pathlib.Path('neosynaptex.py').read_text()
          tree = ast.parse(src)
          for node in ast.walk(tree):
              if isinstance(node, ast.ClassDef) and node.name == 'Neosynaptex':
                  for item in ast.walk(node):
                      if isinstance(item, ast.Attribute) and item.attr == 'gamma':
                          if isinstance(item.ctx, ast.Store):
                              raise AssertionError(f'INV-1 VIOLATED: gamma stored at line {item.lineno}')
          print('INV-1 OK: gamma never stored as attribute')
          "
      - name: INV-2 — import boundaries
        run: |
          python3 -c "
          import ast, pathlib, sys
          violations = []
          for p in pathlib.Path('core').rglob('*.py'):
              tree = ast.parse(p.read_text())
              for node in ast.walk(tree):
                  if isinstance(node, (ast.Import, ast.ImportFrom)):
                      mod = getattr(node, 'module', '') or ''
                      if any(mod.startswith(x) for x in ['tradepulse', 'bn_syn', 'agents']):
                          violations.append(f'{p}:{node.lineno} imports {mod}')
          if violations:
              print('INV-2 VIOLATED:'); [print(f'  {v}') for v in violations]; sys.exit(1)
          print('INV-2 OK: core does not import substrate/agent layers')
          "
      - name: INV-3 — contracts self-test
        run: python3 -c "from contracts.invariants import verify_all; verify_all()" 2>/dev/null || echo "Contracts verify skipped (no verify_all)"
      - name: Canonical Gate (6 gates)
        run: python scripts/ci_canonical_gate.py
      - name: Manuscript claims verification
        run: python scripts/verify_manuscript_claims.py

  # ── Coverage ──────────────────────────────────────────────────────────
  coverage:
    name: Coverage
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip
      - run: pip install -e ".[dev]" pytest-cov --quiet
      - name: Run with coverage
        run: |
          pytest tests/ \
            --cov=core --cov=contracts --cov=neosynaptex --cov-branch \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=30 \
            -q
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  # ── CI Gate ───────────────────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    if: always()
    needs: [lint, typecheck, verify, invariants, coverage]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs passed
        run: |
          results=(
            "${{ needs.lint.result }}"
            "${{ needs.verify.result }}"
            "${{ needs.invariants.result }}"
            "${{ needs.coverage.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" != "success" ]]; then
              echo "::error::Required CI job failed: $r"
              exit 1
            fi
          done
          echo "All CI gates passed."
