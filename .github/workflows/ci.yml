name: NFI CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev]" --quiet

      - name: Verify formula
        run: |
          python3 -c "
          for H, exp in [(0.5,2.0),(0.0,1.0),(1.0,3.0)]:
              g = 2*H+1
              assert abs(g-exp)<1e-9, f'FORMULA ERROR H={H}'
          print('γ_PSD = 2H+1: VERIFIED')
          "

      - name: Run core tests
        run: pytest tests/ -v

      - name: Run legacy tests
        run: pytest test_neosynaptex.py -v --tb=short

      - name: Self-verify axioms
        run: python3 core/axioms.py

      - name: Demo
        run: make demo

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff mypy numpy scipy
      - run: ruff check neosynaptex.py core/ tests/

  invariants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check gamma never stored
        run: |
          python -c "
          import ast, pathlib
          src = pathlib.Path('neosynaptex.py').read_text()
          tree = ast.parse(src)
          for node in ast.walk(tree):
              if isinstance(node, ast.ClassDef) and node.name == 'Neosynaptex':
                  for item in ast.walk(node):
                      if isinstance(item, ast.Attribute) and item.attr == 'gamma':
                          if isinstance(item.ctx, ast.Store):
                              raise AssertionError(f'INV-1 VIOLATED: gamma stored at line {item.lineno}')
          print('INV-1 OK: gamma never stored as attribute')
          "
