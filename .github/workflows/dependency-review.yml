name: Dependency Review

on:
  pull_request:

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Detect dependency graph availability
        id: depgraph
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tmp_dir="$(mktemp -d)"
          status_code="$(curl -sS -D "${tmp_dir}/headers.txt" -o "${tmp_dir}/body.json" -w '%{http_code}' \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GH_REPO}/dependency-graph/sbom")"
          body="$(cat "${tmp_dir}/body.json")"

          if [ "${status_code}" = "200" ]; then
            echo "mode=run" >> "${GITHUB_OUTPUT}"
            echo "Dependency graph endpoint is available (HTTP 200)."
            exit 0
          fi

          if [ "${status_code}" = "404" ]; then
            echo "mode=skip" >> "${GITHUB_OUTPUT}"
            echo "Dependency graph endpoint returned 404 (feature unavailable for this repository context); skipping dependency review."
            exit 0
          fi

          if [ "${status_code}" = "403" ] && grep -qi '^x-ratelimit-remaining: 0' "${tmp_dir}/headers.txt"; then
            echo "::error::GitHub API rate limit exceeded while checking dependency graph availability."
            exit 1
          fi

          if [ "${status_code}" = "401" ] || [ "${status_code}" = "403" ]; then
            echo "::error::Authentication/authorization failure (${status_code}) while checking dependency graph availability."
            echo "::error::Response body: ${body}"
            exit 1
          fi

          echo "::error::Unexpected response (${status_code}) from dependency graph availability probe."
          echo "::error::Response body: ${body}"
          exit 1

      - name: Dependency Review
        if: steps.depgraph.outputs.mode == 'run'
        uses: actions/dependency-review-action@3c4e3dcb1aa7874d2c16be7d79418e9b7efd6261
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

      - name: Dependency Review skipped notice
        if: steps.depgraph.outputs.mode == 'skip'
        run: |
          echo "Dependency graph is explicitly unavailable/disabled; skipping dependency-review action."
