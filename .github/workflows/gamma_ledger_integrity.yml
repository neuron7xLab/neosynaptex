name: gamma_ledger_integrity

# Every entry in ``evidence/gamma_ledger.json`` MUST satisfy the
# γ-ledger structural invariants (required keys, CI envelope,
# positive γ, canonical status, T1–T5 method tier, boolean locked,
# data_source shape). A PR that adds or edits an entry in a way
# that breaks any of these invariants fails this gate.
#
# Structural only. Semantic correctness of the measurement stays
# the reviewer's job.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run γ-ledger integrity check
        run: python -m tools.audit.gamma_ledger_integrity
