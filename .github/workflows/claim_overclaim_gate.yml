name: claim_overclaim_gate

# Phase 2.1 P10 mechanical enforcement: fail any PR whose title, body,
# or production source files contain forbidden overclaim phrases
# (e.g. "cryptographic evidence chain", "hypothesis validated",
# "research proof") OUTSIDE of an explicit disavowal context.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  push:
    branches: [main]
  merge_group:

permissions:
  contents: read
  pull-requests: read

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  check:
    name: claim-overclaim-gate
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install test deps
        run: python -m pip install --quiet pytest

      - name: Run overclaim gate
        env:
          GH_PR_TITLE: ${{ github.event.pull_request.title }}
          GH_PR_BODY: ${{ github.event.pull_request.body }}
        run: python -m tools.audit.claim_overclaim_gate

      - name: Run overclaim-gate tests
        # --noconftest bypasses tests/conftest.py whose project-wide
        # imports (numpy, core.gamma, …) are irrelevant to this gate's
        # tests. The gate itself imports only stdlib.
        run: python -m pytest -q --tb=short --noconftest -p no:cacheprovider tests/test_claim_overclaim_gate.py
