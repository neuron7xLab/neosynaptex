name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  benchmark-regression:
    name: Benchmark Regression
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
          cache: pip
      - run: pip install -e ".[dev]" --quiet

      - name: Substrate γ benchmarks
        run: |
          python3 -c "
          import time, sys
          sys.path.insert(0, '.')
          from core.axioms import SUBSTRATE_GAMMA, classify_regime

          print('=== NFI Substrate Benchmark ===')
          start = time.perf_counter()
          for name, (gamma, note) in SUBSTRATE_GAMMA.items():
              t0 = time.perf_counter()
              regime = classify_regime(gamma)
              dt = time.perf_counter() - t0
              status = 'PASS' if abs(gamma - 1.0) < 0.15 else 'WARN'
              print(f'{status} {name:20s} γ={gamma:.4f} regime={regime} ({dt*1000:.1f}ms)')

          total = time.perf_counter() - start
          print(f'\nTotal: {total:.3f}s')
          assert total < 30.0, f'Benchmark too slow: {total:.1f}s'
          print('BENCHMARK PASS')
          "

      - name: Core test performance
        # Exclude @pytest.mark.slow (calibration basin sweep, per-substrate
        # falsification shuffles, EEG/HRV empirical data loads) — those
        # are regression-quality tests measured by NFI CI, not by this
        # performance budget.
        run: pytest tests/ -q --tb=line --timeout=120 -m "not slow"

      - name: Axiom self-verification
        run: python3 -c "from core.axioms import SUBSTRATE_GAMMA, gamma_psd, verify_axiom_consistency; print('axioms OK:', len(SUBSTRATE_GAMMA), 'substrates')"
