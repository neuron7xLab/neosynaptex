# Substrate measurement table — canonical K/C/γ definitions per substrate.
# Canonical authority: CNS-AI Validation Protocol v1 §Step 2+4, γ-program Phase I §Step 2.
# Pair documents:
#   - docs/CLAIM_BOUNDARY.md §4 (scope qualifiers that every γ-claim must cite)
#   - docs/MEASUREMENT_METHOD_HIERARCHY.md
#   - docs/NULL_MODEL_HIERARCHY.md
#   - evidence/gamma_ledger.json
#
# Invariants enforced by tools/audit/ if a workflow is added for this file:
#   - Every substrate has K_definition, C_definition, signal, measurement_method,
#     fit_window, controls, allowed_claim populated.
#   - allowed_claim is one of {evidential, exploratory, falsified}.
#   - claim_status is one of the five canonical labels.
#   - No substrate can be allowed_claim=evidential unless CLAIM_BOUNDARY.md §5.1
#     six gates are closed.
#
# This YAML is the canonical source of truth for per-substrate semantics.
# Any measurement code that disagrees with this file is wrong by definition.

